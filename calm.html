<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ESC · 진정 (호흡)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="shared/esc.css?v=3">
<script src="shared/telemetry.js"></script>
<script src="shared/progress.js?v=2"></script>
<script src="shared/tips.js?v=1"></script>
<script src="shared/sfx.js?v=1"></script>
<script src="shared/fx.js?v=1"></script>
<style>
  body{overflow:hidden}
  .gwrap{max-width:460px;margin:0 auto;height:100vh;display:flex;flex-direction:column;padding:14px 16px;
    background:radial-gradient(120% 90% at 50% 10%, #E6F6FA, #DCEFF5 70%)}
  .ghud{display:flex;align-items:center;gap:12px;margin-bottom:4px}
  .ghud .x{width:42px;height:42px;border-radius:50%;background:#fff;border:none;box-shadow:0 4px 10px rgba(35,43,54,.14);font-size:18px;cursor:pointer;flex:none}
  .cyc{flex:1;text-align:right;font-family:var(--f-num);font-weight:700;color:var(--m-calm-d)}
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
  .breath{position:relative;width:240px;height:240px;display:flex;align-items:center;justify-content:center}
  .ring{position:absolute;inset:0;border-radius:50%;transform:scale(.45);
    background:radial-gradient(circle, rgba(70,174,201,.30), rgba(70,174,201,.12) 70%);box-shadow:0 0 50px rgba(70,174,201,.25)}
  .ring.r2{background:radial-gradient(circle, rgba(70,174,201,.22), transparent 72%)}
  .eco{width:104px;position:relative;z-index:2}
  .blabel{font-family:var(--f-display);font-size:24px;color:var(--m-calm-d);min-height:30px;text-align:center}
  .bsub{color:var(--ink-soft);font-size:13px;text-align:center;margin-top:-12px}
</style>
</head>
<body>

<div class="ob" id="intro" style="z-index:80;gap:16px;background:radial-gradient(120% 90% at 50% 10%, #E6F6FA, #DCEFF5 70%)">
  <div class="eco bob" style="width:138px"><img src="assets/mascot/web/quokka_calm.png" alt="에코"></div>
  <div class="bubble" style="max-width:330px;font-size:16px"><b id="introNick" style="color:var(--m-calm-d)">학생</b>, 잠깐 숨 고르고 갈까? 🫧</div>
  <div class="tipcard" id="introTip" style="border-left-color:var(--m-calm)"></div>
  <button class="btn3d" id="introStart" style="--btn:var(--m-calm);--btnd:var(--m-calm-d)">시작하기 →</button>
</div>

<div class="gwrap" id="game" style="display:none">
  <div class="ghud">
    <button class="x" onclick="location.href='index.html'" aria-label="나가기">✕</button>
    <div class="cyc"><span id="cyc">0</span> / 5</div>
  </div>
  <div class="stage">
    <div class="breath">
      <div class="ring r2" id="ring2"></div>
      <div class="ring" id="ring"></div>
      <div class="eco bob" style="animation:none"><img src="assets/mascot/web/quokka_calm.png" alt=""></div>
    </div>
    <div>
      <div class="blabel" id="blabel">준비…</div>
      <div class="bsub">원을 따라 천천히 호흡하세요</div>
    </div>
  </div>
</div>

<div class="screen" id="result" style="display:none"></div>

<script>
var CYCLES=5, cycle=0, pi=0, timer=null;
var phases=[
  {t:'숨을 들이쉬어요', d:4000, s:1.0},
  {t:'잠깐 멈춰요',     d:1200, s:1.0},
  {t:'천천히 내쉬어요', d:6000, s:0.45},
  {t:'잠깐 멈춰요',     d:900,  s:0.45}
];
var ring=document.getElementById('ring'), ring2=document.getElementById('ring2'),
    blabel=document.getElementById('blabel'), cyc=document.getElementById('cyc');

function step(){
  var p=phases[pi];
  blabel.textContent=p.t;
  [ring,ring2].forEach(function(r){ r.style.transition='transform '+p.d+'ms ease-in-out'; r.style.transform='scale('+p.s+')'; });
  if(pi===0 && window.SFX) SFX.play('tap');
  pi++;
  if(pi>=phases.length){ pi=0; cycle++; cyc.textContent=cycle; if(cycle>=CYCLES){ timer=setTimeout(endCalm, p.d); return; } }
  timer=setTimeout(step, p.d);
}
function startGame(){
  document.getElementById('intro').classList.add('hide');
  setTimeout(function(){ document.getElementById('intro').style.display='none'; },420);
  document.getElementById('game').style.display='flex';
  cycle=0; pi=0; cyc.textContent=0;
  ESCT.log('session_started',{mode:'calm'});
  timer=setTimeout(step, 500);
}
function endCalm(){
  ESCT.log('session_completed',{mode:'calm',cycles:CYCLES,overallAccuracy:1,completed:true});
  var rw=null; try{ rw=ESCProgress.recordSession('calm'); }catch(e){}
  if(window.SFX)SFX.play('complete');
  document.getElementById('game').style.display='none';
  var gained=rw&&rw.gained?rw.gained:0;
  var r=document.getElementById('result'); r.style.display='flex'; if(window.FX)FX.confetti(60);
  r.innerHTML=
    '<div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin:24px 0 16px">'
    +'<div class="celebrate celebrate-pop"><div class="eco bob" style="width:124px"><img src="assets/mascot/web/quokka_calm.png" alt=""></div></div>'
    +'<div class="celebrate-pop" style="font-family:Jua,sans-serif;font-size:24px">마음이 차분해졌어요 🫧</div></div>'
    +'<div class="statgrid">'
    +'<div class="stat-tile blue"><div class="k">🫧 호흡</div><div class="v">5회</div></div>'
    +'<div class="stat-tile gold"><div class="k">⭐ 획득</div><div class="v">+'+gained+'</div></div>'
    +'</div>'
    +'<div class="bubble" style="margin:6px 0 14px">시험 직전이나 공부 시작 전, 30초만 호흡하면 집중이 한결 부드러워져요.</div>'
    +'<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'
    +'<a class="btn3d" style="--btn:var(--m-calm);--btnd:var(--m-calm-d)" href="calm.html">한 번 더 🫧</a>'
    +'<a class="btn3d ghost" href="index.html">홈으로</a></div>';
}

(function(){
  document.getElementById('introNick').textContent=(localStorage.getItem('esc_nick')||'학생');
  try{ var tip=ESCTips.pickAny();
    document.getElementById('introTip').innerHTML='<div class="tag" style="color:var(--m-calm-d)">'+ESCTips.icon[tip.t]+' '+ESCTips.tag[tip.t]+'</div><div class="h">'+tip.h+'</div><div class="s">'+tip.s+'</div>';
  }catch(e){}
  document.getElementById('introStart').onclick=startGame;
})();
</script>
</body>
</html>
