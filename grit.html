<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ESC · 끈기 (버티기)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="shared/esc.css?v=3">
<script src="shared/telemetry.js"></script>
<script src="shared/progress.js?v=2"></script>
<script src="shared/tips.js?v=1"></script>
<script src="shared/sfx.js?v=1"></script>
<script src="shared/fx.js?v=1"></script>
<style>
  body{overflow:hidden}
  .gwrap{max-width:460px;margin:0 auto;height:100vh;display:flex;flex-direction:column;padding:14px 16px}
  .ghud{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .ghud .x{width:42px;height:42px;border-radius:50%;background:#fff;border:none;box-shadow:0 4px 10px rgba(35,43,54,.14);font-size:18px;cursor:pointer;flex:none}
  .lives{font-size:20px;letter-spacing:2px;flex:1}
  .rnd{font-family:var(--f-num);font-weight:700;font-size:16px;color:var(--m-grit-d)}
  .play{flex:1;position:relative;border-radius:22px;overflow:hidden;background:radial-gradient(130% 100% at 50% 0%,#EAF7EF,#E3F1E8 70%);box-shadow:inset 0 2px 10px rgba(35,43,54,.06)}
  .tgt{position:absolute;width:92px;height:92px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transform:translate(-50%,-50%) scale(0);transition:transform .12s cubic-bezier(.3,1.5,.5,1);-webkit-tap-highlight-color:transparent}
  .tgt.show{transform:translate(-50%,-50%) scale(1)}
  .tgt img{width:74px;height:74px;object-fit:contain;filter:drop-shadow(0 3px 5px rgba(35,43,54,.2));pointer-events:none}
  .tgt .closer{position:absolute;inset:-10px;border-radius:50%;border:4px solid var(--m-grit);opacity:.85}
  .ghint{text-align:center;color:var(--ink-soft);font-size:12px;margin-top:8px}
</style>
</head>
<body>

<div class="ob" id="intro" style="z-index:80;gap:16px">
  <div class="eco bob" style="width:138px"><img src="assets/mascot/web/friend_turtle.png" alt="거북이"></div>
  <div class="bubble" style="max-width:330px;font-size:16px"><b id="introNick" style="color:var(--m-grit-d)">학생</b>, 점점 빨라지고 다른 친구도 나와! 거북이만 콕 🐢</div>
  <div class="tipcard" id="introTip" style="border-left-color:var(--m-grit)"></div>
  <button class="btn3d" id="introStart" style="--btn:var(--m-grit);--btnd:var(--m-grit-d)">시작하기 →</button>
</div>

<div class="gwrap" id="game" style="display:none">
  <div class="ghud">
    <button class="x" onclick="location.href='index.html'" aria-label="나가기">✕</button>
    <div class="lives" id="lives">❤️❤️❤️</div>
    <div class="rnd">라운드 <span id="rnd">0</span></div>
  </div>
  <div class="play" id="play">
    <div class="tgt" id="tgt"><div class="closer" id="closer"></div><img src="assets/mascot/web/friend_turtle.png" alt=""></div>
  </div>
  <div class="ghint"><b style="color:var(--m-grit-d)">거북이🐢만</b> 시간 안에 탭! 다른 친구가 나오면 <b>가만히</b> — 점점 빨라져요</div>
</div>

<div class="screen" id="result" style="display:none"></div>

<script>
var round=0, lives=3, missT=null, alive=false;
var play=document.getElementById('play'), tgt=document.getElementById('tgt'), closer=document.getElementById('closer'),
    livesEl=document.getElementById('lives'), rndEl=document.getElementById('rnd');

var ANIMALS=['friend_rabbit','friend_owl','friend_hedgehog'], curIsTarget=true, tgtImg=tgt.querySelector('img');
function showTgt(){ tgt.classList.remove('show'); void tgt.offsetWidth; tgt.classList.add('show'); }
function loseLife(){ lives--; livesEl.textContent='❤️'.repeat(Math.max(0,lives))+'🖤'.repeat(3-lives); if(window.SFX)SFX.play('wrong'); }
function spawn(){
  round++; rndEl.textContent=round;
  var win=Math.max(560, 1600-round*44);
  var r=play.getBoundingClientRect();
  tgt.style.left=(60+Math.random()*(r.width-120))+'px'; tgt.style.top=(60+Math.random()*(r.height-120))+'px';
  curIsTarget = (round<=3) ? true : (Math.random()<0.62);
  tgtImg.src='assets/mascot/web/'+(curIsTarget?'friend_turtle':ANIMALS[Math.floor(Math.random()*ANIMALS.length)])+'.png';
  showTgt();
  closer.style.transition='none'; closer.style.transform='scale(2.1)'; closer.style.opacity='.85';
  requestAnimationFrame(function(){ closer.style.transition='transform '+win+'ms linear, opacity '+win+'ms'; closer.style.transform='scale(1)'; });
  alive=true; missT=setTimeout(timeUp, win);
}
function hit(){
  if(!alive) return; alive=false; clearTimeout(missT); tgt.classList.remove('show');
  if(curIsTarget){ if(window.SFX)SFX.play('correct'); setTimeout(spawn, 150); }
  else { loseLife(); if(lives<=0){ setTimeout(endGame, 400); return; } setTimeout(spawn, 300); }   // 방해 동물 탭=벌점
}
function timeUp(){
  if(!alive) return; alive=false; tgt.classList.remove('show');
  if(curIsTarget){ loseLife(); if(lives<=0){ setTimeout(endGame, 400); return; } setTimeout(spawn, 320); }  // 거북이 놓침
  else { setTimeout(spawn, 180); }   // 방해 동물 잘 참음
}
tgt.addEventListener('pointerdown',function(e){ e.preventDefault(); hit(); });

function startGame(){
  document.getElementById('intro').classList.add('hide');
  setTimeout(function(){ document.getElementById('intro').style.display='none'; },420);
  document.getElementById('game').style.display='flex';
  round=0; lives=3; livesEl.textContent='❤️❤️❤️';
  ESCT.log('session_started',{mode:'grit'});
  setTimeout(spawn, 500);
}
function endGame(){
  var survived=round-1;
  var best=parseInt(localStorage.getItem('esc_grit_best')||'0',10);
  var isBest=survived>best; if(isBest){ best=survived; localStorage.setItem('esc_grit_best',String(best)); }
  ESCT.log('session_completed',{mode:'grit',rounds:survived,best:best,overallAccuracy:Math.min(1,survived/20),completed:true});
  var rw=null; try{ rw=ESCProgress.recordSession('grit'); }catch(e){}
  if(window.SFX)SFX.play('complete');
  var fb = isBest ? '최고기록 갱신! 끈기가 빛났어요 🔥' : (survived>=12 ? '대단해요! 끝까지 버티는 힘이 좋아요.' : '포기 안 한 게 제일 중요해요. 한 번 더 도전!');
  document.getElementById('game').style.display='none';
  var gained=rw&&rw.gained?rw.gained:0;
  var r=document.getElementById('result'); r.style.display='flex'; if(window.FX)FX.confetti(survived>=10?100:50);
  r.innerHTML=
    '<div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin:22px 0 16px">'
    +'<div class="celebrate celebrate-pop"><div class="eco bob" style="width:124px"><img src="assets/mascot/web/friend_turtle.png" alt=""></div></div>'
    +'<div class="celebrate-pop" style="font-family:Jua,sans-serif;font-size:24px">'+survived+'라운드 버텼어요! 🐢</div></div>'
    +'<div class="statgrid">'
    +'<div class="stat-tile green"><div class="k">🐢 라운드</div><div class="v">'+survived+'</div></div>'
    +'<div class="stat-tile blue"><div class="k">🏆 최고</div><div class="v">'+best+'</div></div>'
    +'<div class="stat-tile gold"><div class="k">⭐ 획득</div><div class="v">+'+gained+'</div></div>'
    +'</div>'
    +'<div class="bubble" style="margin:6px 0 14px">'+fb+'</div>'
    +'<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'
    +'<a class="btn3d" style="--btn:var(--m-grit);--btnd:var(--m-grit-d)" href="grit.html">한 번 더 🐢</a>'
    +'<a class="btn3d ghost" href="index.html">홈으로</a></div>';
}

(function(){
  document.getElementById('introNick').textContent=(localStorage.getItem('esc_nick')||'학생');
  try{ var tip=ESCTips.pickAny();
    document.getElementById('introTip').innerHTML='<div class="tag" style="color:var(--m-grit-d)">'+ESCTips.icon[tip.t]+' '+ESCTips.tag[tip.t]+'</div><div class="h">'+tip.h+'</div><div class="s">'+tip.s+'</div>';
  }catch(e){}
  document.getElementById('introStart').onclick=startGame;
})();
</script>
</body>
</html>
