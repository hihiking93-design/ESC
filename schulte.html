<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ESC · 슐테 (시각탐색)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="shared/esc.css?v=3">
<script src="shared/telemetry.js"></script>
<script src="shared/progress.js?v=2"></script>
<script src="shared/tips.js?v=1"></script>
<script src="shared/sfx.js?v=1"></script>
<script src="shared/fx.js?v=1"></script>
<style>
  body{overflow:hidden}
  .gwrap{max-width:460px;margin:0 auto;height:100vh;display:flex;flex-direction:column;padding:14px 16px}
  .ghud{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .ghud .x{width:42px;height:42px;border-radius:50%;background:#fff;border:none;box-shadow:0 4px 10px rgba(35,43,54,.14);font-size:18px;cursor:pointer;flex:none}
  .next{flex:1;text-align:center;font-family:var(--f-display);font-size:16px;color:var(--ink)}
  .next b{color:var(--m-speed);font-size:22px}
  .gtimer{font-family:var(--f-num);font-weight:700;font-size:17px;color:var(--ink-soft);min-width:42px;text-align:right}
  .grid{flex:1;display:grid;grid-template-columns:repeat(5,1fr);gap:8px;align-content:center}
  .cell{aspect-ratio:1;border-radius:14px;background:#fff;border:2.5px solid var(--line);box-shadow:0 4px 0 var(--line);
    font-family:var(--f-num);font-weight:700;font-size:clamp(18px,6vw,26px);color:var(--ink);cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:transform .06s,background .12s,border-color .12s;-webkit-tap-highlight-color:transparent}
  .cell:active{transform:translateY(3px);box-shadow:0 0 0 var(--line)}
  .cell.done{background:var(--m-grit);border-color:var(--m-grit-d);box-shadow:0 4px 0 var(--m-grit-d);color:#fff;pointer-events:none}
  .cell.bad{animation:cshake .35s}
  @keyframes cshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .ghint{text-align:center;color:var(--ink-soft);font-size:12px;margin-top:12px}
</style>
</head>
<body class="gbg">

<div class="ob" id="intro" style="z-index:80;gap:16px">
  <div class="eco bob" style="width:138px"><img src="assets/mascot/web/friend_owl.png" alt="부엉이"></div>
  <div class="bubble" style="max-width:330px;font-size:16px"><b id="introNick" style="color:var(--m-speed)">학생</b>, 시각탐색 훈련! <img class="ico" src="assets/icons/search.png" alt=""></div>
  <div class="tipcard" id="introTip" style="border-left-color:var(--m-speed)"></div>
  <button class="btn3d" id="introStart" style="--btn:var(--m-speed);--btnd:var(--m-speed-d)">시작하기 →</button>
</div>

<div class="gwrap" id="game" style="display:none">
  <div class="ghud">
    <button class="x" onclick="location.href='index.html'" aria-label="나가기">✕</button>
    <div class="next">다음 숫자 <b id="nextN">1</b></div>
    <div class="gtimer" id="timer">0.0</div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="ghint">1 → 25 순서대로 가능한 빠르게 탭하세요. 눈을 가운데 두고 주변을 훑어보세요.</div>
</div>

<div class="screen" id="result" style="display:none"></div>

<script>
var LV=Math.min(29,+((new URLSearchParams(location.search)).get('lv')||0));
var N=25+(LV>=10?5:0)+(LV>=20?5:0), grid=document.getElementById('grid'), nextEl=document.getElementById('nextN'), timerEl=document.getElementById('timer');
var next=1, errors=0, t0=0, running=false, raf=0;

function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }

function buildGrid(){
  grid.innerHTML='';
  var nums=shuffle(Array.from({length:N},function(_,i){return i+1;}));
  nums.forEach(function(n){
    var c=document.createElement('button'); c.className='cell'; c.textContent=n; c.dataset.n=n;
    c.onclick=function(){ tap(c,n); };
    grid.appendChild(c);
  });
}
function tap(c,n){
  if(!running) return;
  if(n===next){
    c.classList.add('done'); if(window.SFX)SFX.play('select'); next++; nextEl.textContent=next>N?'✓':next;
    if(next>N){ endGame(); }
  } else {
    errors++; c.classList.remove('bad'); void c.offsetWidth; c.classList.add('bad'); if(window.SFX)SFX.play('wrong');
  }
}
function tick(){
  if(!running) return;
  timerEl.textContent=((performance.now()-t0)/1000).toFixed(1);
  raf=requestAnimationFrame(tick);
}
function startGame(){
  document.getElementById('intro').classList.add('hide');
  setTimeout(function(){ document.getElementById('intro').style.display='none'; },420);
  document.getElementById('game').style.display='flex';
  next=1; errors=0; nextEl.textContent=1; buildGrid();
  ESCT.log('session_started',{mode:'focus',game:'schulte'});
  t0=performance.now(); running=true; tick();
}
function endGame(){
  running=false; cancelAnimationFrame(raf);
  var timeMs=performance.now()-t0, sec=(timeMs/1000);
  var acc=Math.round(N/(N+errors)*100);
  // 점수: 시간(45s 기준)·정확도 혼합 → overallAccuracy
  var timeScore=Math.max(0,Math.min(100,Math.round((45-sec)/45*100)));
  var overall=Math.round((acc*0.5)+(timeScore*0.5));
  ESCT.log('session_completed',{mode:'focus',game:'schulte',timeMs:Math.round(timeMs),errors:errors,overallAccuracy:overall/100,completed:true});
  var rw=null; try{ rw=ESCProgress.recordSession('focus'); }catch(e){}
  if(window.SFX)SFX.play('complete');
  showResult(sec, acc, rw);
}
function showResult(sec, acc, rw){
  document.getElementById('game').style.display='none';
  var gained=rw&&rw.gained?rw.gained:0;
  var fb;
  if(errors>=4){ fb='급하게 찾다가 몇 번 헷갈렸지? 가운데 보면서 천천히 훑으면 실수가 줄어 — 다시 해보자! <img class="ico" src="assets/icons/search.png" alt="">'; }
  else if(sec<=28){ fb='숫자를 휙휙 잘 찾았어! 눈이랑 집중이 빨라지고 있어 <img class="ico" src="assets/icons/search.png" alt="">'; }
  else { fb='끝까지 다 찾았어! 한 칸씩 말고 "전체를 한눈에" 보는 느낌으로 하면 더 빨라져.'; }
  var r=document.getElementById('result'); r.style.display='flex'; if(window.FX)FX.confetti();
  r.innerHTML=
    '<div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin:22px 0 16px">'
    +'<div class="celebrate celebrate-pop"><div class="eco bob" style="width:124px"><img src="assets/mascot/web/friend_owl.png" alt=""></div></div>'
    +'<div class="celebrate-pop" style="font-family:Jua,sans-serif;font-size:25px">탐색 완료! <img class="ico" src="assets/icons/party.png" alt=""></div></div>'
    +'<div class="statgrid">'
    +'<div class="stat-tile blue"><div class="k">⏱ 시간</div><div class="v">'+sec.toFixed(1)+'s</div></div>'
    +'<div class="stat-tile green"><div class="k"><img class="ico" src="assets/icons/target.png" alt=""> 정확도</div><div class="v">'+acc+'%</div></div>'
    +'<div class="stat-tile gold"><div class="k"><img class="ico" src="assets/icons/star.png" alt=""> 획득</div><div class="v">+'+gained+'</div></div>'
    +'</div>'
    +'<div class="bubble" style="margin:6px 0 14px">실수 '+errors+'번 · '+fb+'</div>'
    +'<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'
    +'<a class="btn3d" style="--btn:var(--m-speed);--btnd:var(--m-speed-d)" href="schulte.html">다시 <img class="ico" src="assets/icons/refresh.png" alt=""></a>'
    +'<a class="btn3d ghost" href="index.html">홈으로</a></div>';
}

(function(){
  document.getElementById('introNick').textContent=(localStorage.getItem('esc_nick')||'학생');
  try{ var tip=ESCTips.pickAny();
    document.getElementById('introTip').innerHTML='<div class="tag" style="color:var(--m-speed)">'+ESCTips.icon[tip.t]+' '+ESCTips.tag[tip.t]+'</div><div class="h">'+tip.h+'</div><div class="s">'+tip.s+'</div>';
  }catch(e){}
  document.getElementById('introStart').onclick=startGame;
})();
</script>
</body>
</html>
