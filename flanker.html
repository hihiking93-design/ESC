<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ESC · 플랭커 (선택주의)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="shared/esc.css?v=3">
<script src="shared/telemetry.js"></script>
<script src="shared/progress.js?v=2"></script>
<script src="shared/tips.js?v=1"></script>
<script src="shared/sfx.js?v=1"></script>
<script src="shared/fx.js?v=1"></script>
<style>
  body{overflow:hidden}
  .gwrap{max-width:460px;margin:0 auto;height:100vh;display:flex;flex-direction:column;padding:14px 16px}
  .ghud{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .ghud .x{width:42px;height:42px;border-radius:50%;background:#fff;border:none;box-shadow:0 4px 10px rgba(35,43,54,.14);font-size:18px;cursor:pointer;flex:none}
  .prog{flex:1;height:14px;border-radius:999px;background:rgba(40,48,59,.12);overflow:hidden}
  .prog .fill{height:100%;border-radius:999px;background:var(--m-speed);width:0;transition:width .2s}
  .pn{font-family:var(--f-num);font-weight:700;font-size:15px;color:var(--ink-soft);min-width:48px;text-align:right}
  .nb-ask{text-align:center;font-family:var(--f-display);font-size:15px;color:var(--ink);margin:4px 0 8px}
  .nb-ask b{color:var(--m-speed)}
  .stage{flex:1;display:flex;align-items:center;justify-content:center;border-radius:22px;box-shadow:inset 0 2px 10px rgba(35,43,54,.06)}
  .arrows{font-size:clamp(40px,13vw,64px);letter-spacing:6px;color:var(--ink);transition:transform .05s}
  .arrows .mid{color:var(--m-speed)}
  .stage.good .arrows{transform:scale(1.1)} .stage.bad .arrows{animation:ash .3s}
  @keyframes ash{0%,100%{transform:translateX(0)}30%{transform:translateX(-8px)}70%{transform:translateX(8px)}}
  .dirs{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:6px}
  .dir{height:74px;border-radius:20px;border:none;background:#fff;font-size:34px;color:var(--ink);
    box-shadow:0 6px 0 var(--line);cursor:pointer}
  .dir:active{transform:translateY(6px);box-shadow:0 0 0 var(--line)}
  .ghint{text-align:center;color:var(--ink-soft);font-size:12px;margin-top:8px}
</style>
</head>
<body class="gbg">

<div class="ob" id="intro" style="z-index:80;gap:16px">
  <div class="eco bob" style="width:138px"><img src="assets/mascot/web/friend_rabbit.png" alt="토끼"></div>
  <div class="bubble" style="max-width:330px;font-size:16px"><b id="introNick" style="color:var(--m-speed)">학생</b>, <b style="color:var(--m-speed)">가운데</b> 화살표만! ➡️</div>
  <div class="tipcard" id="introTip" style="border-left-color:var(--m-speed)"></div>
  <button class="btn3d" id="introStart" style="--btn:var(--m-speed);--btnd:var(--m-speed-d)">시작하기 →</button>
</div>

<div class="gwrap" id="game" style="display:none">
  <div class="ghud">
    <button class="x" onclick="location.href='index.html'" aria-label="나가기">✕</button>
    <div class="prog"><div class="fill" id="prog"></div></div>
    <div class="pn" id="pn">0/30</div>
  </div>
  <div class="nb-ask"><b>가운데</b> 화살표 방향을 고르세요 (양옆은 함정)</div>
  <div class="stage" id="stage"><div class="arrows" id="arrows"></div></div>
  <div class="dirs">
    <button class="dir" data-d="L">←</button>
    <button class="dir" data-d="R">→</button>
  </div>
  <div class="ghint">옆 화살표에 휘둘리지 말고 가운데에만 집중 — 선택적 주의 훈련</div>
</div>

<div class="screen" id="result" style="display:none"></div>

<script>
var TOTAL=30, trial=0, correct=0, rtSum=0, tStart=0, curDir=null, curIncong=false, congRT=[], incongRT=[];
var stage=document.getElementById('stage'), arrows=document.getElementById('arrows'),
    prog=document.getElementById('prog'), pn=document.getElementById('pn');
function arr(d){ return d==='L'?'←':'→'; }
function nextTrial(){
  if(trial>=TOTAL){ endGame(); return; }
  trial++; pn.textContent=trial+'/'+TOTAL; prog.style.width=Math.round((trial-1)/TOTAL*100)+'%';
  var center=Math.random()<0.5?'L':'R';
  var incong=Math.random()<0.55; curIncong=incong;
  var fl=incong?(center==='L'?'R':'L'):center;
  arrows.innerHTML=arr(fl)+arr(fl)+'<span class="mid">'+arr(center)+'</span>'+arr(fl)+arr(fl);
  curDir=center; tStart=performance.now();
}
function answer(d){
  var ok=(d===curDir);
  if(ok){ correct++; var rt=performance.now()-tStart; rtSum+=rt; (curIncong?incongRT:congRT).push(rt); stage.className='stage good'; if(window.SFX)SFX.play('correct'); }
  else { stage.className='stage bad'; if(window.SFX)SFX.play('wrong'); }
  setTimeout(function(){ stage.className='stage'; nextTrial(); }, ok?160:400);
}
[].forEach.call(document.querySelectorAll('.dir'),function(b){ b.addEventListener('pointerdown',function(e){ e.preventDefault(); answer(b.getAttribute('data-d')); }); });
document.addEventListener('keydown',function(e){ if(e.key==='ArrowLeft'){answer('L');} else if(e.key==='ArrowRight'){answer('R');} });

function startGame(){
  document.getElementById('intro').classList.add('hide');
  setTimeout(function(){ document.getElementById('intro').style.display='none'; },420);
  document.getElementById('game').style.display='flex';
  trial=0; correct=0; rtSum=0;
  ESCT.log('session_started',{mode:'speed',game:'flanker'});
  nextTrial();
}
function endGame(){
  prog.style.width='100%';
  var acc=Math.round(correct/TOTAL*100), avgRt=correct?Math.round(rtSum/correct):0;
  ESCT.log('session_completed',{mode:'speed',game:'flanker',overallAccuracy:acc/100,avgRt:avgRt,correct:correct,completed:true});
  var rw=null; try{ rw=ESCProgress.recordSession('speed'); }catch(e){}
  if(window.SFX)SFX.play('complete');
  document.getElementById('game').style.display='none';
  var gained=rw&&rw.gained?rw.gained:0;
  function mean(a){ return a.length? a.reduce(function(s,x){return s+x;},0)/a.length : 0; }
  var interf = (congRT.length&&incongRT.length) ? Math.round(mean(incongRT)-mean(congRT)) : null;
  var prevA=null; try{ var ps=ESCT.dump().filter(function(e){return e.event==='session_completed'&&e.game==='flanker';}); if(ps.length>=2) prevA=Math.round(ps[ps.length-2].overallAccuracy*100); }catch(e){}
  var trend = prevA!==null ? (acc>prevA?' · 지난판 +'+(acc-prevA)+'%p↑':acc<prevA?' · 지난판 '+(acc-prevA)+'%p':'') : '';
  var fb;
  if(acc<70){ fb='정확도 우선 — 가운데 화살표에 시선을 고정하고 반박자 늦게 반응해봐요.'; }
  else if(interf!==null && interf>120){ fb='불일치(양옆 반대)에서 평균 +'+interf+'ms 느려졌어요 — 방해자극 억제에 부하가 걸린 신호. 시선을 가운데 한 점에 고정하면 좁혀집니다.'; }
  else if(interf!==null && interf>40){ fb='간섭 효과 +'+interf+'ms로 안정적 — 옆 화살표를 잘 걸러내고 있어요.'; }
  else { fb='간섭이 거의 없어요'+(interf!==null?' (+'+interf+'ms)':'')+' — 선택적 주의가 탄탄해요. 속도를 더 올려보세요.'; }
  fb+=trend;
  var r=document.getElementById('result'); r.style.display='flex'; if(window.FX)FX.confetti();
  r.innerHTML=
    '<div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin:22px 0 16px">'
    +'<div class="celebrate celebrate-pop"><div class="eco bob" style="width:124px"><img src="assets/mascot/web/friend_rabbit.png" alt=""></div></div>'
    +'<div class="celebrate-pop" style="font-family:Jua,sans-serif;font-size:25px">집중 완료! ➡️</div></div>'
    +'<div class="statgrid">'
    +'<div class="stat-tile blue"><div class="k">🎯 정확도</div><div class="v">'+acc+'%</div></div>'
    +'<div class="stat-tile green"><div class="k">⚡ 반응</div><div class="v">'+(avgRt||'-')+(avgRt?'ms':'')+'</div></div>'
    +'<div class="stat-tile gold"><div class="k">⭐ 획득</div><div class="v">+'+gained+'</div></div>'
    +'</div>'
    +'<div class="bubble" style="margin:6px 0 14px">'+correct+'/'+TOTAL+' 정답 · '+fb+'</div>'
    +'<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'
    +'<a class="btn3d" style="--btn:var(--m-speed);--btnd:var(--m-speed-d)" href="flanker.html">다시 🔄</a>'
    +'<a class="btn3d ghost" href="index.html">홈으로</a></div>';
}

(function(){
  document.getElementById('introNick').textContent=(localStorage.getItem('esc_nick')||'학생');
  try{ var tip=ESCTips.pickAny();
    document.getElementById('introTip').innerHTML='<div class="tag" style="color:var(--m-speed)">'+ESCTips.icon[tip.t]+' '+ESCTips.tag[tip.t]+'</div><div class="h">'+tip.h+'</div><div class="s">'+tip.s+'</div>';
  }catch(e){}
  document.getElementById('introStart').onclick=startGame;
})();
</script>
</body>
</html>
