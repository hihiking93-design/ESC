<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ESC Space Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; overflow: hidden;
  font-family: 'Noto Sans KR', sans-serif;
}
canvas { display: block; border-radius: 8px; }
#ui {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
#ui > div { pointer-events: auto; }
.overlay {
  background: rgba(10,10,26,0.92);
  border-radius: 20px; padding: 40px 48px;
  text-align: center; color: #fff;
  animation: fadeIn 0.4s ease;
  max-width: 420px; width: 90%;
}
@keyframes fadeIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
.hidden { display: none !important; }
.game-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 28px; color: #4361ee;
  text-shadow: 0 0 20px rgba(67,97,238,0.5);
  margin-bottom: 8px;
}
.game-sub { font-size: 13px; color: #8892a4; margin-bottom: 32px; }
.stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1e1e3a; font-size: 15px; }
.stat-row:last-child { border: none; }
.stat-label { color: #8892a4; }
.stat-value { font-weight: 700; }
.coin-display {
  margin: 24px 0;
  font-family: 'Press Start 2P', monospace;
  font-size: 32px; color: #ffd700;
  text-shadow: 0 0 16px rgba(255,215,0,0.6);
}
.coin-display small { font-size: 14px; color: #8892a4; display: block; margin-bottom: 8px; font-family: 'Noto Sans KR', sans-serif; }
.btn {
  padding: 14px 36px; border: none; border-radius: 12px;
  font-size: 16px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: transform 0.1s, opacity 0.2s;
  margin: 6px;
}
.btn:active { transform: scale(0.96); }
.btn-primary { background: #4361ee; color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-ghost { background: rgba(255,255,255,0.08); color: #8892a4; }
.controls-hint { font-size: 12px; color: #555; margin-top: 16px; line-height: 1.8; }
.input-group { margin-bottom: 20px; text-align: left; }
.input-group label { font-size: 13px; color: #8892a4; display: block; margin-bottom: 6px; }
.input-group input {
  width: 100%; padding: 12px 16px; border: 1.5px solid #2a2a4a;
  border-radius: 10px; font-size: 15px; font-family: inherit;
  color: #fff; background: #12122a; outline: none;
}
.input-group input:focus { border-color: #4361ee; }

/* Mobile touch controls */
#touchControls {
  display: none; position: fixed; bottom: 0; left: 0; width: 100%;
  padding: 12px 20px 24px; z-index: 10;
  justify-content: space-between; align-items: center;
}
.touch-btn {
  width: 64px; height: 64px; border-radius: 50%;
  background: rgba(67,97,238,0.25); border: 2px solid rgba(67,97,238,0.5);
  color: #fff; font-size: 24px; display: flex;
  align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.touch-btn:active { background: rgba(67,97,238,0.5); }
.touch-fire { width: 80px; height: 80px; background: rgba(247,37,133,0.3); border-color: rgba(247,37,133,0.6); }
@media (pointer: coarse) { #touchControls { display: flex; } }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="ui">
  <!-- Title Screen -->
  <div class="overlay" id="titleScreen">
    <div class="game-title">ESC SPACE</div>
    <div class="game-sub">Edu Space Care Arcade</div>
    <div class="input-group">
      <label>PILOT NAME</label>
      <input type="text" id="pilotName" placeholder="홍길동" autofocus>
    </div>
    <button class="btn btn-primary" id="startBtn">출격하기</button>
    <div class="controls-hint">
      <b>[PC]</b> 방향키 이동 / Space 발사<br>
      <b>[모바일]</b> 하단 버튼
    </div>
  </div>

  <!-- Game Over Screen -->
  <div class="overlay hidden" id="gameOverScreen">
    <div class="game-title" style="font-size:20px;">MISSION COMPLETE</div>
    <div class="game-sub" id="goName"></div>
    <div style="margin:20px 0;">
      <div class="stat-row"><span class="stat-label">격파 수</span><span class="stat-value" id="goKills">0</span></div>
      <div class="stat-row"><span class="stat-label">발사 수</span><span class="stat-value" id="goShots">0</span></div>
      <div class="stat-row"><span class="stat-label">명중률</span><span class="stat-value" id="goAccuracy">0%</span></div>
      <div class="stat-row"><span class="stat-label">웨이브</span><span class="stat-value" id="goWave">0</span></div>
      <div class="stat-row"><span class="stat-label">점수</span><span class="stat-value" id="goScore">0</span></div>
    </div>
    <div class="coin-display">
      <small>획득 코인</small>
      <span id="goCoins">0</span>
    </div>
    <div>
      <button class="btn btn-primary" id="retryBtn">다시 출격</button>
      <button class="btn btn-ghost" id="homeBtn">홈으로</button>
    </div>
  </div>
</div>

<!-- Mobile Touch Controls -->
<div id="touchControls">
  <div style="display:flex;gap:12px;">
    <button class="touch-btn" id="tLeft">&#9664;</button>
    <button class="touch-btn" id="tRight">&#9654;</button>
  </div>
  <button class="touch-btn touch-fire" id="tFire">FIRE</button>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Canvas Setup
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 480, H = 640;
canvas.width = W; canvas.height = H;

function resizeCanvas() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H, 1);
  canvas.style.width = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// State
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let state = 'TITLE'; // TITLE, PLAYING, GAME_OVER
let pilotName = '';
let player, bullets, enemies, eBullets, particles, stars;
let score, lives, wave, kills, shotsFired;
let enemyDir, enemySpeed, enemyDropTimer, enemyShootTimer;
let keys = {};
let frameId;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Stars background
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function initStars() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      s: Math.random() * 1.5 + 0.5,
      v: Math.random() * 0.5 + 0.2,
      a: Math.random()
    });
  }
}
initStars();

function updateStars() {
  stars.forEach(s => {
    s.y += s.v;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  });
}

function drawStars() {
  stars.forEach(s => {
    ctx.globalAlpha = 0.3 + s.a * 0.5;
    ctx.fillStyle = '#fff';
    ctx.fillRect(s.x, s.y, s.s, s.s);
  });
  ctx.globalAlpha = 1;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Game Init
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function initGame() {
  player = { x: W / 2, y: H - 60, w: 32, h: 24, speed: 5, invincible: 0 };
  bullets = [];
  eBullets = [];
  enemies = [];
  particles = [];
  score = 0; lives = 3; wave = 0; kills = 0; shotsFired = 0;
  enemyDir = 1; enemySpeed = 0.6; enemyDropTimer = 0; enemyShootTimer = 0;
  spawnWave();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Enemy Waves
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const ENEMY_COLORS = ['#f72585', '#4361ee', '#06d6a0', '#ffd700', '#ff6b35'];

function spawnWave() {
  wave++;
  const rows = Math.min(3 + Math.floor(wave / 2), 6);
  const cols = Math.min(6 + Math.floor(wave / 3), 10);
  const spacing = 44;
  const startX = (W - (cols - 1) * spacing) / 2;
  const startY = 50;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const type = r < 1 ? 2 : r < 2 ? 1 : 0; // top rows are stronger
      enemies.push({
        x: startX + c * spacing,
        y: startY + r * spacing,
        w: 28, h: 20,
        type,
        hp: type + 1,
        color: ENEMY_COLORS[type],
        pts: (type + 1) * 100,
        baseX: startX + c * spacing,
        alive: true,
        animT: Math.random() * Math.PI * 2,
      });
    }
  }
  enemySpeed = 0.6 + wave * 0.15;
  enemyDir = 1;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Particles
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.02 + Math.random() * 0.03,
      size: Math.random() * 3 + 1,
      color,
    });
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Drawing helpers
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function drawPlayer() {
  if (player.invincible > 0 && Math.floor(player.invincible * 10) % 2 === 0) return;
  ctx.save();
  ctx.translate(player.x, player.y);
  // Ship body
  ctx.fillStyle = '#4361ee';
  ctx.beginPath();
  ctx.moveTo(0, -player.h / 2);
  ctx.lineTo(-player.w / 2, player.h / 2);
  ctx.lineTo(-player.w / 4, player.h / 3);
  ctx.lineTo(player.w / 4, player.h / 3);
  ctx.lineTo(player.w / 2, player.h / 2);
  ctx.closePath();
  ctx.fill();
  // Engine glow
  ctx.fillStyle = '#06d6a0';
  ctx.globalAlpha = 0.6 + Math.random() * 0.4;
  ctx.fillRect(-4, player.h / 3, 8, 6 + Math.random() * 4);
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  e.animT += 0.05;
  const bob = Math.sin(e.animT) * 2;
  ctx.translate(0, bob);
  ctx.fillStyle = e.color;
  // Body
  ctx.fillRect(-e.w / 2, -e.h / 2, e.w, e.h);
  // Eyes
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(-8, -4, 5, 5);
  ctx.fillRect(3, -4, 5, 5);
  // Wings
  ctx.fillStyle = e.color;
  ctx.globalAlpha = 0.5;
  ctx.fillRect(-e.w / 2 - 6, -2, 6, 6);
  ctx.fillRect(e.w / 2, -2, 6, 6);
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawBullet(b) {
  ctx.fillStyle = b.color || '#ffd700';
  ctx.shadowColor = b.color || '#ffd700';
  ctx.shadowBlur = 6;
  ctx.fillRect(b.x - 2, b.y - 5, 4, 10);
  ctx.shadowBlur = 0;
}

function drawHUD() {
  // Score
  ctx.fillStyle = '#fff';
  ctx.font = '700 16px "Press Start 2P", monospace';
  ctx.textAlign = 'left';
  ctx.fillText(score, 16, 30);
  // Wave
  ctx.textAlign = 'center';
  ctx.font = '10px "Press Start 2P", monospace';
  ctx.fillStyle = '#8892a4';
  ctx.fillText('WAVE ' + wave, W / 2, 24);
  // Lives
  ctx.textAlign = 'right';
  for (let i = 0; i < lives; i++) {
    ctx.fillStyle = '#f72585';
    ctx.beginPath();
    const lx = W - 20 - i * 28;
    ctx.moveTo(lx, 16);
    ctx.lineTo(lx - 8, 28);
    ctx.lineTo(lx + 8, 28);
    ctx.closePath();
    ctx.fill();
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Collision
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function hitTest(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax - aw/2 < bx + bw/2 && ax + aw/2 > bx - bw/2 &&
         ay - ah/2 < by + bh/2 && ay + ah/2 > by - bh/2;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Update
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let shootCooldown = 0;

function update() {
  if (state !== 'PLAYING') return;

  // Player movement
  if (keys['ArrowLeft'] || keys['tLeft']) player.x -= player.speed;
  if (keys['ArrowRight'] || keys['tRight']) player.x += player.speed;
  player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));

  if (player.invincible > 0) player.invincible -= 1 / 60;

  // Shooting
  shootCooldown -= 1 / 60;
  if ((keys[' '] || keys['tFire']) && shootCooldown <= 0) {
    bullets.push({ x: player.x, y: player.y - player.h / 2, vy: -8, color: '#ffd700' });
    shotsFired++;
    shootCooldown = 0.18;
  }

  // Bullets
  bullets.forEach(b => b.y += b.vy);
  bullets = bullets.filter(b => b.y > -10);

  // Enemy bullets
  eBullets.forEach(b => b.y += b.vy);
  eBullets = eBullets.filter(b => b.y < H + 10);

  // Enemy movement
  let edgeHit = false;
  enemies.forEach(e => {
    if (!e.alive) return;
    e.x += enemySpeed * enemyDir;
    if (e.x < 24 || e.x > W - 24) edgeHit = true;
  });
  if (edgeHit) {
    enemyDir *= -1;
    enemies.forEach(e => { if (e.alive) e.y += 16; });
  }

  // Enemy shooting
  enemyShootTimer -= 1 / 60;
  if (enemyShootTimer <= 0) {
    const alive = enemies.filter(e => e.alive);
    if (alive.length > 0) {
      const shooter = alive[Math.floor(Math.random() * alive.length)];
      eBullets.push({ x: shooter.x, y: shooter.y + shooter.h / 2, vy: 3 + wave * 0.3, color: '#f72585' });
    }
    enemyShootTimer = Math.max(0.3, 1.2 - wave * 0.08);
  }

  // Bullet → Enemy collision
  bullets.forEach(b => {
    enemies.forEach(e => {
      if (!e.alive) return;
      if (hitTest(b.x, b.y, 4, 10, e.x, e.y, e.w, e.h)) {
        e.hp--;
        b.y = -999;
        if (e.hp <= 0) {
          e.alive = false;
          score += e.pts;
          kills++;
          spawnExplosion(e.x, e.y, e.color, 12);
        } else {
          spawnExplosion(b.x, b.y, '#fff', 4);
        }
      }
    });
  });

  // EBullet → Player collision
  if (player.invincible <= 0) {
    eBullets.forEach(b => {
      if (hitTest(b.x, b.y, 4, 10, player.x, player.y, player.w, player.h)) {
        b.y = 9999;
        playerHit();
      }
    });
    // Enemy → Player collision
    enemies.forEach(e => {
      if (!e.alive) return;
      if (hitTest(e.x, e.y, e.w, e.h, player.x, player.y, player.w, player.h)) {
        e.alive = false;
        spawnExplosion(e.x, e.y, e.color, 12);
        playerHit();
      }
      // Enemy reaches bottom
      if (e.alive && e.y > H - 40) {
        playerHit();
        e.alive = false;
        spawnExplosion(e.x, e.y, e.color, 8);
      }
    });
  }

  // Particles
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.life -= p.decay;
  });
  particles = particles.filter(p => p.life > 0);

  // Wave clear
  if (enemies.every(e => !e.alive)) {
    score += wave * 500; // wave clear bonus
    spawnWave();
  }
}

function playerHit() {
  lives--;
  spawnExplosion(player.x, player.y, '#4361ee', 20);
  if (lives <= 0) {
    gameOver();
  } else {
    player.invincible = 2;
  }
}

function gameOver() {
  state = 'GAME_OVER';
  showGameOver();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Draw
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function draw() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  updateStars();
  drawStars();

  if (state === 'PLAYING') {
    drawPlayer();
    bullets.forEach(drawBullet);
    eBullets.forEach(drawBullet);
    enemies.forEach(e => { if (e.alive) drawEnemy(e); });

    // Particles
    particles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    });
    ctx.globalAlpha = 1;

    drawHUD();
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Game Loop
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function loop() {
  update();
  draw();
  frameId = requestAnimationFrame(loop);
}
loop();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Coin Calculation
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function calcCoins() {
  const accuracy = shotsFired > 0 ? kills / shotsFired : 0;
  let coins = 0;
  // Base: score / 100
  coins += Math.floor(score / 100);
  // Accuracy bonus
  if (accuracy >= 0.8) coins = Math.floor(coins * 1.5);
  else if (accuracy >= 0.6) coins = Math.floor(coins * 1.2);
  // Wave bonus
  coins += wave * 10;
  return Math.max(coins, 1);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// UI
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showGameOver() {
  const accuracy = shotsFired > 0 ? (kills / shotsFired * 100) : 0;
  const coins = calcCoins();

  document.getElementById('goName').textContent = pilotName + ' 파일럿';
  document.getElementById('goKills').textContent = kills;
  document.getElementById('goShots').textContent = shotsFired;
  document.getElementById('goAccuracy').textContent = accuracy.toFixed(1) + '%';
  document.getElementById('goWave').textContent = 'WAVE ' + wave;
  document.getElementById('goScore').textContent = score.toLocaleString();
  document.getElementById('goCoins').textContent = coins.toLocaleString();
  document.getElementById('gameOverScreen').classList.remove('hidden');
  document.getElementById('touchControls').style.display = 'none';
}

function startGame() {
  const name = document.getElementById('pilotName').value.trim();
  if (!name) return alert('이름을 입력하세요.');
  pilotName = name;
  state = 'PLAYING';
  initGame();
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  // Show touch controls on mobile
  if ('ontouchstart' in window) {
    document.getElementById('touchControls').style.display = 'flex';
  }
}

document.getElementById('startBtn').onclick = startGame;
document.getElementById('pilotName').addEventListener('keydown', e => {
  if (e.key === 'Enter') startGame();
});
document.getElementById('retryBtn').onclick = () => {
  document.getElementById('gameOverScreen').classList.add('hidden');
  state = 'PLAYING';
  initGame();
  if ('ontouchstart' in window) {
    document.getElementById('touchControls').style.display = 'flex';
  }
};
document.getElementById('homeBtn').onclick = () => {
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('titleScreen').classList.remove('hidden');
  state = 'TITLE';
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Input
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
window.addEventListener('keydown', e => {
  if (state === 'PLAYING') {
    keys[e.key] = true;
    if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
      e.preventDefault();
    }
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch controls
function bindTouch(id, key) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => { e.preventDefault(); keys[id] = true; });
  el.addEventListener('touchend', e => { e.preventDefault(); keys[id] = false; });
  el.addEventListener('touchcancel', e => { keys[id] = false; });
}
bindTouch('tLeft');
bindTouch('tRight');
bindTouch('tFire');
</script>
</body>
