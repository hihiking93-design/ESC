<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ESC · 매일 5분 집중 여정</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="shared/esc.css?v=3">
<script src="shared/progress.js?v=2"></script>
<script src="shared/telemetry.js"></script>
<script src="shared/daily.js?v=1"></script>
<style>
  .ob-cast{display:flex;gap:14px;justify-content:center}
  .pavatar{width:46px;height:46px;border-radius:50%;object-fit:cover;object-position:50% 24%}
  .scenery{position:absolute;z-index:0;pointer-events:none;filter:drop-shadow(0 5px 7px rgba(35,43,54,.13))}
  .unit-banner{position:absolute;left:0;width:100%;height:54px;border-radius:16px;background:var(--mc);
    box-shadow:0 4px 0 var(--mcd);display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;color:#fff;z-index:2}
  .unit-banner .ub-n{font-family:var(--f-display);font-size:15px;line-height:1.1}
  .unit-banner .ub-t{font-size:11px;opacity:.93;margin-top:3px}
  .unit-banner .ub-ic{font-size:20px;background:rgba(255,255,255,.22);width:40px;height:40px;border-radius:11px;display:grid;place-items:center;flex:none}
  .atmo{position:absolute;z-index:-1;pointer-events:none;border-radius:50%}
  .cband{position:absolute;left:0;width:100%;z-index:-3;pointer-events:none;transition:background .4s}
  .jwarn{background:#FFF3D6;border:2px solid #FBE0A2;color:#8A6A1E;border-radius:14px;padding:11px 14px;font-family:var(--f-display);font-size:13px;text-align:center;margin-bottom:10px}
  .gradesel{width:100%;max-width:340px;text-align:center;margin-top:2px}
  .gs-q{font-family:var(--f-display);font-size:14px;color:var(--ink-soft);margin-bottom:7px}
  .gs-row{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:8px}
  .gs-row.need{animation:obshake .4s}
  @keyframes obshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
  .gchip{border:2px solid var(--line);background:#fff;color:var(--ink-soft);border-radius:12px;padding:8px 13px;font-family:var(--f-display);font-size:14px;cursor:pointer;transition:transform .12s,background .12s}
  .gchip.on{background:var(--m-focus);border-color:var(--m-focus);color:#fff;transform:scale(1.06)}
</style>
</head>
<body>

<!-- ── 온보딩 (최초 1회) ─────────────────────────── -->
<div class="ob" id="ob" style="display:none">
  <div class="eco bob" style="width:188px"><img src="assets/mascot/web/quokka_greet.png" alt="에코"></div>
  <div class="bubble" style="font-size:17px;max-width:330px">안녕! 난 <b style="color:var(--m-focus)">에코</b>야 <img class="ico" src="assets/icons/headset.png" alt=""><br>친구들이랑 매일 5분, 같이 집중력 키우자!</div>
  <div class="ob-cast">
    <span class="coin floaty" style="width:60px"><img src="assets/mascot/web/friend_hedgehog.png" alt="고슴도치"></span>
    <span class="coin floaty" style="width:60px;animation-delay:.3s"><img src="assets/mascot/web/friend_owl.png" alt="부엉이"></span>
    <span class="coin floaty" style="width:60px;animation-delay:.6s"><img src="assets/mascot/web/friend_rabbit.png" alt="토끼"></span>
  </div>
  <input class="nick" id="nickInput" placeholder="이름이 뭐야?" maxlength="12" autocomplete="off">
  <div class="gradesel"><div class="gs-q">몇 학년이야?</div><div class="gs-row" id="gradeRow"></div></div>
  <div class="gradesel"><div class="gs-q">어떤 게 더 떨려?</div><div class="gs-row" id="subjRow"><button class="gchip" data-subj="math">수학</button><button class="gchip" data-subj="eng">영어</button></div></div>
  <button class="btn3d" id="obStart">시작하기 →</button>
</div>

<!-- ── 홈 (학습 여정 path) ───────────────────────── -->
<div class="screen" id="home" style="display:none">
  <header style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px">
    <button class="cbtn" id="profileBtn" aria-label="프로필" onclick="location.href='profile.html'"><img class="pavatar" src="assets/mascot/web/quokka_greet.png" alt=""></button>
    <div class="wordmark"><span class="e">e</span><span class="s">s</span><span class="c">c</span></div>
    <div class="streak"><img class="ico" src="assets/icons/flame.png" alt=""> <span id="streakN">0</span></div>
  </header>

  <!-- 주간 할당량 -->
  <div class="weekbar pop d1" id="weekbar" style="margin-bottom:8px">
    <div class="stat"><img class="ico" src="assets/icons/star.png" alt=""> <span id="starN">0</span></div>
    <div class="wk">
      <div class="dots" id="qdots"></div>
      <div class="ql" id="qlabel">이번 주 0/3</div>
    </div>
  </div>

  <!-- 가이드 에코 -->
  <div class="guide pop d2" style="margin-bottom:6px">
    <span class="coin floaty" style="width:50px;flex:none"><img src="assets/mascot/web/quokka_greet.png" alt="에코"></span>
    <div id="greet" style="font-family:var(--f-display);font-size:15px;line-height:1.4">오늘도 한 걸음 가볼까? <img class="ico" src="assets/icons/headset.png" alt=""></div>
  </div>

  <div id="journeyWarn" class="jwarn" style="display:none"></div>

  <!-- 오늘의 훈련 -->
  <div class="daily pop d2" id="dailyCard" style="margin-bottom:12px"></div>

  <!-- 징검다리 여정 -->
  <div class="path" id="path"></div>

  <div class="chapter-more">
    <div class="cm-dots">• • •</div>
    <div class="cm-t">CHAPTER 3 · 곧 만나요</div>
    <div class="cm-s">더 깊은 훈련이 준비 중이에요 <img class="ico" src="assets/icons/sparkle.png" alt=""></div>
  </div>
</div>

<script>
var WEB = 'assets/mascot/web/';
// 학습 여정 — 듣기→집중→속도→도전→끈기→진정 (돌마다 다른 캐릭터)
// 6기둥 풀 — 30챕터(≈90노드) 여정으로 사이클
var POOL = [
  {id:'listening',label:'듣기',face:'quokka_listen',  c:'--m-listen',   cd:'--m-listen-d',   href:'listening.html'},
  {id:'focus',    label:'집중',face:'friend_owl',     c:'--m-focus',    cd:'--m-focus-d',    games:['cheonggi.html']},
  {id:'speed',    label:'속도',face:'friend_rabbit',  c:'--m-speed',    cd:'--m-speed-d',    games:['schulte.html','flanker.html']},
  {id:'challenge',label:'도전',face:'friend_hedgehog',c:'--m-challenge',cd:'--m-challenge-d',games:['stroop.html','brave.html']},
  {id:'grit',     label:'끈기',face:'friend_turtle',  c:'--m-grit',     cd:'--m-grit-d',     games:['grit.html','persist.html']},
  {id:'calm',     label:'진정',face:'quokka_calm',    c:'--m-calm',     cd:'--m-calm-d',     href:'calm.html'}
];
var CHAPTERS=30, PER=3, TOTAL_NODES=CHAPTERS*PER;
// 성과 기반 진행 — 잘하면 전진, 못하면 정체/강등
var allDone=[]; try{ allDone=(ESCT.dump()||[]).filter(function(e){return e.event==='session_completed';}); }catch(e){}
var pos=parseInt(localStorage.getItem('esc_pos')||'0',10), proc=parseInt(localStorage.getItem('esc_proc')||'0',10), demoted=false;
for(var pj=proc; pj<allDone.length; pj++){ var aa=allDone[pj].overallAccuracy; if(typeof aa!=='number') aa=allDone[pj].accuracy;
  if(typeof aa==='number'){ if(aa>=0.7) pos=Math.min(TOTAL_NODES-1,pos+1); else if(aa<0.5 && pos>0){ pos--; demoted=true; } } }
localStorage.setItem('esc_pos',String(pos)); localStorage.setItem('esc_proc',String(allDone.length));
var unlocked=pos+1;
var _rec=allDone.slice(-3).map(function(e){return (typeof e.overallAccuracy==='number')?e.overallAccuracy:(e.accuracy||0);});
var _ra=_rec.length?_rec.reduce(function(s,x){return s+x;},0)/_rec.length:1;
var warnMsg = demoted ? '한 단계 내려왔어요 — 여기서 단단히 다지고 가요! 💪' : ((_rec.length>=2 && _ra<0.6) ? '최근 정확도가 흔들려요. 다음 학습은 천천히·정확하게! 🎯' : '');
// 학년 → 난이도 기준선 (초1=0 … 고3=+22)
var gOff=(function(){ var g=parseInt(localStorage.getItem('esc_grade')||'0',10); return g>0?(g-1)*2:0; })();
var BANDS=['입문','기초','초급','초중급','중급','중상급','상급','고급','전문','심화','숙련','마스터'];
var JOURNEY=[];
for(var gi=0; gi<TOTAL_NODES; gi++){
  var pp=POOL[gi%POOL.length], chapter=Math.floor(gi/PER);
  var band=Math.min(BANDS.length-1, Math.floor(chapter*BANDS.length/CHAPTERS));
  var it={id:pp.id+'-'+gi, label:pp.label, face:pp.face, c:pp.c, cd:pp.cd,
          sub:BANDS[band], href:pp.href, games:pp.games, lv:chapter};
  if(gi>=unlocked) it.locked=true; else if(gi===unlocked-1) it.active=true;
  JOURNEY.push(it);
}
var path = document.getElementById('path');
var stoneEls = [];
JOURNEY.forEach(function(s,i){
  var el=document.createElement(s.locked?'div':'a');
  el.className='stone pop d'+Math.min(i+1,6)+(s.active?' active':'')+(s.locked?' locked':'');
  if(!s.locked){ var lv=Math.min(29,(s.lv||0)+gOff), q='?lv='+lv;
    el.href = (s.games ? s.games[0] : s.href) + q;
    if(s.games){ el.addEventListener('click',function(e){ e.preventDefault(); location.href=s.games[Math.floor(Math.random()*s.games.length)]+q; }); } }
  el.style.setProperty('--mc','var('+s.c+')');
  el.style.setProperty('--mcd','var('+s.cd+')');
  el.innerHTML =
    (s.active?'<div class="start-bubble">오늘 시작! <img class="ico" src="assets/icons/sparkle.png" alt=""></div>':'')
    + '<div class="node"><img src="'+WEB+s.face+'.png" alt="">'+(s.locked?'<span class="lock">🔒</span>':'')+'</div>'
    + '<div class="label">'+s.label+'</div><div class="sub">'+s.sub+'</div>';
  path.appendChild(el); stoneEls.push(el);
});
// 설치물 + 카메오 — near=기준 노드, dy=노드top 오프셋, x=중앙기준, s=크기, r=회전, flip=반전
var PROPS=['cloud','signpost','books','star','plant','chest','headset','trophy','pencil'];
var GRASS=['grass','grass2','bush','flower'];
var DECOR=[];
for(var di=1; di<TOTAL_NODES; di+=2){
  DECOR.push({src:'assets/props/web/'+PROPS[Math.floor(di/2)%PROPS.length]+'.png', near:di, x:((di%4<2)?-1:1)*112, dy:-8, s:54, r:0});
}
for(var gj=0; gj<TOTAL_NODES; gj++){
  DECOR.push({src:'assets/scenery/'+GRASS[gj%GRASS.length]+'.png', near:gj, x:(gj%2?1:-1)*(120+(gj*11%34)), dy:74, s:40, r:0});
}
var decorEls=DECOR.map(function(d){ var im=document.createElement('img'); im.className='scenery'; im.src=d.src; im.alt=''; path.appendChild(im); return im; });
// 챕터 배경 밴드 (열린=컬러, 잠금=회색)
var CBG=['linear-gradient(180deg,#E4F0FF,#EFF6FF)','linear-gradient(180deg,#E6F4E1,#F0F9EB)','linear-gradient(180deg,#FFECD9,#FFF4E8)','linear-gradient(180deg,#ECE7FB,#F3EFFC)','linear-gradient(180deg,#DFF4F0,#ECF9F6)','linear-gradient(180deg,#FCE7EA,#FDF0F2)'];
var CBG_GRAY='linear-gradient(180deg,#E9ECF0,#F1F4F7)';
var bandEls=[]; for(var bc=0;bc<CHAPTERS;bc++){ var bd=document.createElement('div'); bd.className='cband'; path.appendChild(bd); bandEls.push(bd); }

// 챕터 헤더 — 30개 자동 생성
var CH_TH=[{n:'인지 훈련',t:'듣고 · 집중하고 · 빠르게'},{n:'마음 훈련',t:'도전 · 끈기 · 차분히'}];
var UNITS=[];
for(var ch=0; ch<CHAPTERS; ch++){
  var th=CH_TH[ch%2], cp=POOL[(ch*PER)%POOL.length];
  UNITS.push({before:ch*PER, c:cp.c, cd:cp.cd, n:'CHAPTER '+(ch+1)+' · '+th.n, t:th.t});
}
var CH_ICONS=['book','brain','target','star','bolt','flag','search','trophy'];
var bannerEls=UNITS.map(function(u,k){
  var b=document.createElement('div'); b.className='unit-banner';
  b.style.setProperty('--mc','var('+u.c+')'); b.style.setProperty('--mcd','var('+u.cd+')');
  b.innerHTML='<div><div class="ub-n">'+u.n+'</div><div class="ub-t">'+u.t+'</div></div><div class="ub-ic"><img class="ico" src="assets/icons/'+CH_ICONS[k%CH_ICONS.length]+'.png" alt=""></div>';
  path.appendChild(b); return b;
});

// 배경 분위기 블롭
var ATMO_C=['rgba(76,130,232,.10)','rgba(124,108,224,.09)','rgba(47,184,166,.10)','rgba(230,138,78,.08)'];
var ATMO=[]; for(var ay=140, ai=0; ay<TOTAL_NODES*186; ay+=820, ai++){ ATMO.push({x:(ai%2?170:-160), y:ay, s:260, c:ATMO_C[ai%ATMO_C.length]}); }
var atmoEls=ATMO.map(function(a){ var el=document.createElement('div'); el.className='atmo'; el.style.background='radial-gradient(circle,'+a.c+',transparent 70%)'; path.appendChild(el); return el; });

var OFFS=[0,-58,58,-58,58,0], STEP=176, NODE=45, HALF=56, U_TOP=8, BAN_H=54, BAN_GAP=46, NS='http://www.w3.org/2000/svg';
function _cx(i,W){ return Math.round(W/2 + OFFS[i%OFFS.length]); }

function buildPath(){
  var W=path.clientWidth; if(!W) return;
  var n=JOURNEY.length, tops=[], bany=[], y=U_TOP, u=0, i;
  for(i=0;i<n;i++){
    if(u<UNITS.length && UNITS[u].before===i){ bany[u]=y; y+=BAN_H+BAN_GAP; u++; }
    tops[i]=y; y+=STEP;
  }
  var H=y+34; path.style.height=H+'px';
  stoneEls.forEach(function(el,k){ el.style.top=tops[k]+'px'; el.style.left=(_cx(k,W)-HALF)+'px'; });
  bannerEls.forEach(function(b,k){ b.style.top=bany[k]+'px'; });
  bandEls.forEach(function(bd,bch){ var bt=bany[bch], bb=(bch+1<bany.length?bany[bch+1]:H); bd.style.top=(bt-20)+'px'; bd.style.height=(bb-bt)+'px'; bd.style.background=(bch*PER>=unlocked)?CBG_GRAY:CBG[bch%CBG.length]; });
  DECOR.forEach(function(d,k){ var im=decorEls[k]; im.style.width=d.s+'px'; im.style.left=(W/2+d.x-d.s/2)+'px'; im.style.top=(tops[d.near]+d.dy)+'px'; im.style.transform='rotate('+d.r+'deg)'+(d.flip?' scaleX(-1)':''); im.style.filter=(d.near>=unlocked)?'grayscale(1) opacity(.5)':''; });
  atmoEls.forEach(function(el,k){ var a=ATMO[k]; el.style.width=a.s+'px'; el.style.height=a.s+'px'; el.style.left=(W/2+a.x-a.s/2)+'px'; el.style.top=a.y+'px'; });
  var svg=document.getElementById('pathTrail');
  if(!svg){ svg=document.createElementNS(NS,'svg'); svg.id='pathTrail'; svg.setAttribute('preserveAspectRatio','none'); path.insertBefore(svg, path.firstChild);
    svg.innerHTML='<defs><radialGradient id="goldGrad" cx="34%" cy="26%" r="80%"><stop offset="0%" stop-color="#FFFDF0"/><stop offset="20%" stop-color="#FFE38A"/><stop offset="60%" stop-color="#F4B63E"/><stop offset="100%" stop-color="#B8791E"/></radialGradient><radialGradient id="grayGrad" cx="34%" cy="26%" r="80%"><stop offset="0%" stop-color="#EDF1F6"/><stop offset="55%" stop-color="#C7D1DD"/><stop offset="100%" stop-color="#9DAAB9"/></radialGradient></defs><g class="dots"></g>';
  }
  svg.setAttribute('width',W); svg.setAttribute('height',H);
  var gEnd=Math.max(0,(typeof unlocked!=='undefined'?unlocked:1)-1);
  var dg=svg.querySelector('.dots'); while(dg.firstChild) dg.removeChild(dg.firstChild);
  for(i=1;i<n;i++){
    var P0x=_cx(i-1,W), P0y=tops[i-1]+NODE, P3x=_cx(i,W), P3y=tops[i]+NODE, my=(P0y+P3y)/2, gold=(i<=gEnd);
    [0.16,0.32,0.5,0.68,0.84].forEach(function(t){
      var mt=1-t, bx=mt*mt*mt*P0x+3*mt*mt*t*P0x+3*mt*t*t*P3x+t*t*t*P3x,
          by=mt*mt*mt*P0y+3*mt*mt*t*my+3*mt*t*t*my+t*t*t*P3y;
      var c=document.createElementNS(NS,'circle'); c.setAttribute('cx',bx.toFixed(1)); c.setAttribute('cy',by.toFixed(1));
      c.setAttribute('r', gold?'6.5':'4.5'); c.setAttribute('fill', gold?'url(#goldGrad)':'url(#grayGrad)');
      dg.appendChild(c);
    });
  }
}
window.addEventListener('resize', buildPath);

// ── 닉네임 / 스트릭 / 온보딩 ────────────────────────
var NICK_KEY = 'esc_nick';
function showHome(){
  document.getElementById('home').style.display = 'flex';
  requestAnimationFrame(buildPath); setTimeout(function(){ buildPath(); var a=document.querySelector('.stone.active'); if(a) a.scrollIntoView({block:'center'}); }, 300);
  var nick = localStorage.getItem(NICK_KEY);
  if (nick) document.getElementById('greet').innerHTML = '<b>'+nick+'</b>, 오늘도 한 걸음 가볼까? <img class="ico" src="assets/icons/headset.png" alt="">';
  try {
    var w = ESCProgress.week();
    document.getElementById('starN').textContent = w.stars;
    document.getElementById('streakN').textContent = w.streak;
    var dots=''; for(var i=0;i<w.quota;i++){ dots+='<i class="'+(i<w.done?'on':'')+'"></i>'; }
    for(var j=0;j<w.over;j++){ dots+='<i class="over"></i>'; }
    document.getElementById('qdots').innerHTML=dots;
    var ql=document.getElementById('qlabel');
    if(w.over>0){ ql.textContent='할당량 +'+w.over+' 초과! <img class="ico" src="assets/icons/flame.png" alt="">'; ql.className='ql met'; }
    else if(w.met){ ql.textContent='이번 주 달성! <img class="ico" src="assets/icons/check.png" alt="">'; ql.className='ql met'; }
    else { ql.textContent='이번 주 '+w.done+'/'+w.quota+' · '+(w.quota-w.done)+'번 더'; ql.className='ql'; }
  } catch(e){}
  var jw=document.getElementById('journeyWarn'); if(jw){ if(warnMsg){ jw.innerHTML=warnMsg; jw.style.display='block'; } else jw.style.display='none'; }
  renderDaily();
}
function renderDaily(){
  var el=document.getElementById('dailyCard'); if(!el||!window.ESCDaily) return;
  var p=ESCDaily.todayPillar(), qs=ESCDaily.quests(), allDone=ESCDaily.allDone();
  var html='<div class="dtop" style="background:linear-gradient(135deg,var('+p.c+'),var('+p.c+'-d))">'
    +'<div class="dt-l"><span class="dt-em">'+p.emoji+'</span><div><div class="dt-k">오늘의 영역</div><div class="dt-n">'+p.name+'의 날</div></div></div>'
    +'<a class="dt-go" href="'+p.href+'">지금 하기</a></div><div class="dquests">';
  qs.forEach(function(q){ html+='<div class="dq'+(q.done?' done':'')+'"><span class="ck">'+(q.done?'✓':'')+'</span>'+q.label+'<span class="cur">'+q.cur+'/'+q.target+'</span></div>'; });
  html+='</div>'+(allDone?'<div class="dall">오늘 퀘스트 완료! <img class="ico" src="assets/icons/party.png" alt=""> 잘했어요</div>':'');
  el.innerHTML=html;
}
if (localStorage.getItem(NICK_KEY)) {
  showHome();
} else {
  var ob = document.getElementById('ob');
  ob.style.display = 'flex';
  var selGrade=0, selSubj='math';
  var GR=[['초',6],['중',3],['고',3]], gl=0, gradeRow=document.getElementById('gradeRow');
  GR.forEach(function(grp){ for(var y=1;y<=grp[1];y++){ gl++; (function(lvl,txt){ var b=document.createElement('button'); b.className='gchip'; b.textContent=txt;
    b.onclick=function(){ selGrade=lvl; [].forEach.call(gradeRow.children,function(c){c.classList.remove('on');}); b.classList.add('on'); }; gradeRow.appendChild(b); })(gl, grp[0]+y); } });
  var subjRow=document.getElementById('subjRow');
  [].forEach.call(subjRow.children, function(b){ b.onclick=function(){ selSubj=b.getAttribute('data-subj'); [].forEach.call(subjRow.children,function(c){c.classList.remove('on');}); b.classList.add('on'); }; });
  subjRow.children[0].classList.add('on');
  function finishOb(){
    var v = document.getElementById('nickInput').value.trim();
    if (!v){ document.getElementById('nickInput').focus(); return; }
    if (!selGrade){ gradeRow.classList.add('need'); setTimeout(function(){ gradeRow.classList.remove('need'); }, 450); return; }
    localStorage.setItem(NICK_KEY, v);
    localStorage.setItem('esc_grade', String(selGrade));
    localStorage.setItem('esc_subject', selSubj);
    ob.classList.add('hide');
    setTimeout(function(){ ob.style.display='none'; showHome(); }, 450);
  }
  document.getElementById('obStart').onclick = finishOb;
  document.getElementById('nickInput').addEventListener('keydown', function(e){ if(e.key==='Enter') finishOb(); });
}
</script>
</body>
</html>
