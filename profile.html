<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ESC · 프로필</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="shared/esc.css?v=3">
<script src="shared/telemetry.js"></script>
<script src="shared/progress.js?v=2"></script>
<style>
  .topbar2{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .back{width:44px;height:44px;border-radius:50%;background:#fff;border:none;box-shadow:0 4px 10px rgba(35,43,54,.14);font-size:20px;cursor:pointer}
  .ptitle{font-family:var(--f-display);font-size:18px}
  .pcard{background:#fff;border-radius:var(--r-lg);padding:20px;text-align:center;box-shadow:var(--shadow-soft);margin-bottom:14px}
  .pcard .av{width:120px;margin:0 auto 8px}
  .pcard .nick{font-family:var(--f-display);font-size:22px}
  .pcard .meta{color:var(--ink-soft);font-size:13px;margin-top:3px}
  .srow{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}
  .scard{background:#fff;border-radius:16px;padding:13px 14px;display:flex;align-items:center;gap:11px;box-shadow:0 4px 12px rgba(35,43,54,.08)}
  .scard .ic{font-size:24px}
  .scard .k{font-size:12px;color:var(--ink-soft)} .scard .v{font-family:var(--f-num);font-weight:700;font-size:20px;line-height:1.1}
  .week7{display:flex;justify-content:space-between;background:#fff;border-radius:16px;padding:14px 10px;box-shadow:0 4px 12px rgba(35,43,54,.08);margin-bottom:18px}
  .day{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:11px;color:var(--ink-soft)}
  .day .dot{width:28px;height:28px;border-radius:50%;background:#E5EAF1;display:grid;place-items:center;font-size:14px;color:#fff}
  .day.on .dot{background:var(--m-grit)}
  .day.today .dot{box-shadow:0 0 0 3px rgba(76,130,232,.35)}
  .pill{background:#fff;border-radius:16px;padding:12px 15px;box-shadow:0 4px 12px rgba(35,43,54,.08);margin-bottom:10px;display:flex;align-items:center;gap:12px}
  .pill .face{width:46px;height:46px;border-radius:13px;overflow:hidden;border:2.5px solid var(--mc);flex:none;background:#FBEBD3}
  .pill .face img{width:100%;height:100%;object-fit:cover;object-position:50% 28%}
  .pill .body{flex:1;min-width:0}
  .pill .nm{font-family:var(--f-display);font-size:14px}
  .pill .bar{height:10px;border-radius:6px;background:#E5EAF1;margin-top:6px;overflow:hidden}
  .pill .fill{height:100%;border-radius:6px;background:var(--mc)}
  .pill .st{font-size:11px;color:var(--ink-soft);margin-top:5px}
  .pill.lock{opacity:.62}
  .badges{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .badge{background:#fff;border-radius:14px;padding:12px 5px;text-align:center;box-shadow:0 4px 12px rgba(35,43,54,.08)}
  .badge .bi{font-size:26px} .badge .bl{font-size:10.5px;color:var(--ink-soft);margin-top:4px;line-height:1.2}
  .badge.off{opacity:.4;filter:grayscale(1)}
  .chartcard{background:#fff;border-radius:16px;padding:14px 12px;box-shadow:0 4px 12px rgba(35,43,54,.08);margin-bottom:18px}
  .sechead{display:flex;align-items:center;justify-content:space-between;margin:10px 2px 10px}
  .seg{display:inline-flex;background:#E9EEF4;border-radius:10px;padding:3px}
  .seg button{border:none;background:transparent;font-family:var(--f-body);font-size:12px;font-weight:700;color:var(--ink-soft);padding:5px 12px;border-radius:8px;cursor:pointer}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(35,43,54,.12)}
</style>
</head>
<body>
<div class="screen">
  <div class="topbar2" style="justify-content:space-between">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="back" onclick="location.href='index.html'" aria-label="뒤로">←</button>
      <div class="ptitle">프로필</div>
    </div>
    <button class="back" onclick="location.href='settings.html'" aria-label="설정"><img class="ico" src="assets/icons/gear.png" alt=""></button>
  </div>

  <div class="pcard">
    <div class="eco av"><img src="assets/mascot/web/quokka_greet.png" alt="에코"></div>
    <div class="nick" id="nick">학생</div>
    <div class="meta" id="meta"></div>
  </div>

  <div class="srow" id="srow"></div>

  <h2 class="sec">종합 능력치</h2>
  <div class="chartcard" id="radar"></div>

  <h2 class="sec">이번 주 활동</h2>
  <div class="week7" id="week7"></div>

  <h2 class="sec">능력별 진행</h2>
  <div id="pillars"></div>

  <div class="sechead">
    <h2 class="sec" style="margin:0">정답률 추이</h2>
    <div class="seg" id="trendSeg">
      <button data-m="session" class="on">세션</button><button data-m="week">주간</button><button data-m="month">월간</button>
    </div>
  </div>
  <div class="chartcard" id="trend"></div>

  <h2 class="sec" style="margin-top:8px">뱃지</h2>
  <div class="badges" id="badges"></div>

  <p class="muted" style="margin-top:18px">이 통계는 나중에 선생님·학부모와 공유할 수 있어요.</p>
</div>

<script>
function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function monday(d){var x=new Date(d.getFullYear(),d.getMonth(),d.getDate());var g=(x.getDay()+6)%7;x.setDate(x.getDate()-g);return x;}

var p = ESCProgress.get();
var wk = ESCProgress.week();
document.getElementById('nick').textContent = localStorage.getItem('esc_nick') || '학생';
document.getElementById('meta').textContent = 'ESC와 함께 · 총 ' + (p.totalSessions||0) + '회 학습';

// 스탯 카드
var srow=document.getElementById('srow');
[['<img class="ico" src="assets/icons/flame.png" alt="">','연속',(p.streak||0)+'일'],['<img class="ico" src="assets/icons/star.png" alt="">','총 별',(p.stars||0)],['<img class="ico" src="assets/icons/target.png" alt="">','학습 횟수',(p.totalSessions||0)],['<img class="ico" src="assets/icons/calendar.png" alt="">','이번 주',wk.done+'/'+wk.quota]]
.forEach(function(s){var d=document.createElement('div');d.className='scard';d.innerHTML='<div class="ic">'+s[0]+'</div><div><div class="k">'+s[1]+'</div><div class="v">'+s[2]+'</div></div>';srow.appendChild(d);});

// 상위 N% — 정규분포 곡선 위에 내 위치 표시 (오른쪽 꼬리 면적 = 상위 N%, 통계적으로 정확)
var rb=document.createElement('div');
rb.style.cssText='background:linear-gradient(135deg,#FFF6D8,#FFE7B0);border-radius:18px;padding:15px 14px 12px;text-align:center;margin-bottom:18px;box-shadow:0 4px 12px rgba(35,43,54,.08)';
rb.innerHTML='<div style="font-size:12px;color:#8A6A1E">내 순위 불러오는 중…</div>';
srow.parentNode.insertBefore(rb, srow.nextSibling);
// 역정규누적분포(probit) — Acklam 근사
function probit(p){
  var a=[-3.969683028665376e+1,2.209460984245205e+2,-2.759285104469687e+2,1.38357751867269e+2,-3.066479806614716e+1,2.506628277459239],
      b=[-5.447609879822406e+1,1.615858368580409e+2,-1.556989798598866e+2,6.680131188771972e+1,-1.328068155288572e+1],
      c=[-7.784894002430293e-3,-3.223964580411365e-1,-2.400758277161838,-2.549732539343734,4.374664141464968,2.938163982698783],
      d=[7.784695709041462e-3,3.224671290700398e-1,2.445134137142996,3.754408661907416],
      pl=0.02425,ph=1-pl,q,r;
  if(p<pl){ q=Math.sqrt(-2*Math.log(p)); return (((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1); }
  if(p<=ph){ q=p-0.5; r=q*q; return (((((a[0]*r+a[1])*r+a[2])*r+a[3])*r+a[4])*r+a[5])*q/(((((b[0]*r+b[1])*r+b[2])*r+b[3])*r+b[4])*r+1); }
  q=Math.sqrt(-2*Math.log(1-p)); return -(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);
}
function drawBell(topPct){
  var W=320,H=152,base=120,peak=92,zMax=3.2,i,z;
  function X(z){ return 14+(zMax-z)/(2*zMax)*(W-28); }  // 왼쪽=상위(앞섬), 오른쪽=하위
  function Y(z){ return base-peak*Math.exp(-z*z/2); }
  var cz=Math.max(-zMax,Math.min(zMax,probit(Math.max(0.004,Math.min(0.996,1-topPct/100)))));
  var cv=[]; for(i=0;i<=80;i++){ z=-zMax+2*zMax*i/80; cv.push(X(z).toFixed(1)+','+Y(z).toFixed(1)); }
  var sh=[]; for(i=0;i<=44;i++){ z=cz+(zMax-cz)*i/44; sh.push(X(z).toFixed(1)+','+Y(z).toFixed(1)); }
  var mx=X(cz), my=Y(cz), lx=Math.max(46,Math.min(W-46,mx));
  var s='<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block;margin:2px 0">';
  s+='<defs><linearGradient id="bellShade" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F4B63E" stop-opacity=".82"/><stop offset="100%" stop-color="#FFE38A" stop-opacity=".32"/></linearGradient></defs>';
  s+='<line x1="14" y1="'+base+'" x2="'+(W-14)+'" y2="'+base+'" stroke="#E5C98C" stroke-width="1.5"/>';
  s+='<path d="M '+X(cz).toFixed(1)+','+base+' L '+sh.join(' L ')+' L '+X(zMax).toFixed(1)+','+base+' Z" fill="url(#bellShade)"/>';
  s+='<path d="M '+cv.join(' L ')+'" fill="none" stroke="#C9A24A" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  s+='<line x1="'+mx.toFixed(1)+'" y1="'+(my-2).toFixed(1)+'" x2="'+mx.toFixed(1)+'" y2="'+base+'" stroke="#B8791E" stroke-width="2.5" stroke-dasharray="4 3"/>';
  s+='<circle cx="'+mx.toFixed(1)+'" cy="'+my.toFixed(1)+'" r="6" fill="#fff" stroke="#B8791E" stroke-width="3"/>';
  s+='<text x="'+lx.toFixed(1)+'" y="'+(my-12).toFixed(1)+'" font-size="12.5" font-family="Jua,sans-serif" fill="#B8791E" text-anchor="middle">나 · 상위 '+topPct+'%</text>';
  s+='<text x="22" y="'+(base+18)+'" font-size="10.5" fill="#A98B4E">상위</text>';
  s+='<text x="'+(W/2)+'" y="'+(base+18)+'" font-size="10.5" fill="#A98B4E" text-anchor="middle">평균</text>';
  s+='<text x="'+(W-22)+'" y="'+(base+18)+'" font-size="10.5" fill="#A98B4E" text-anchor="end">하위</text>';
  return s+'</svg>';
}
(function(){ try{ var c=ESCT.cfg; if(!c){rb.style.display='none';return;}
  fetch(c.url+'/rest/v1/rpc/esc_top_percent',{method:'POST',headers:{'apikey':c.anon,'Authorization':'Bearer '+c.anon,'Content-Type':'application/json'},body:JSON.stringify({p_anon:ESCT.anonId(),p_game:null})})
   .then(function(r){return r.json();}).then(function(v){
     rb.innerHTML=(v!=null)
       ? '<div style="font-family:Jua,sans-serif;font-size:22px;color:#B8791E">상위 '+v+'%</div><div style="font-size:11.5px;color:#8A6A1E;margin-top:1px">전체 친구들 중 내 위치</div>'+drawBell(v)+'<div style="font-size:11px;color:#8A6A1E;margin-top:2px;word-break:keep-all">정확도 기준 · 왼쪽일수록 상위권이에요</div>'
       : '<div style="font-size:13px;color:#8A6A1E">친구들이 더 모이면 순위가 나와요 ⭐</div>';
   }).catch(function(){ rb.style.display='none'; });
}catch(e){ rb.style.display='none'; } })();

// 이번 주 7일
var days=['월','화','수','목','금','토','일'], mon=monday(new Date()), todayStr=ymd(new Date());
var weekDays=(p.week&&p.week.days)||[], w7=document.getElementById('week7');
for(var i=0;i<7;i++){var dd=new Date(mon);dd.setDate(mon.getDate()+i);var ds=ymd(dd);
  var on=weekDays.indexOf(ds)>-1, today=ds===todayStr;
  var el=document.createElement('div');el.className='day'+(on?' on':'')+(today?' today':'');
  el.innerHTML='<div class="dot">'+(on?'✓':'')+'</div>'+days[i];w7.appendChild(el);}

// 능력별 진행 — 6영역 모두 텔레메트리로 집계 (게임→기둥 매핑, 폴백=mode)
var ev=[]; try{ev=ESCT.dump();}catch(e){}
var comp=ev.filter(function(e){return e.event==='session_completed';});
var GP={cheonggi:'focus',nback:'focus',schulte:'speed',flanker:'speed',stroop:'challenge',brave:'challenge',persist:'grit'};
function pillarOf(e){ return (e.game&&GP[e.game])?GP[e.game]:e.mode; }
var pstat={};
comp.forEach(function(e){ var id=pillarOf(e); if(!id)return; if(!pstat[id])pstat[id]={n:0,acc:0,acn:0};
  pstat[id].n++; if(typeof e.overallAccuracy==='number'){ pstat[id].acc+=e.overallAccuracy; pstat[id].acn++; } });
function pInfo(id){ var s=pstat[id]; if(!s||!s.n) return {n:0,avg:null,score:0};
  var avg=s.acn?Math.round(s.acc/s.acn*100):null;
  var score=Math.min(100, Math.round((avg!=null?avg:55)*0.7 + Math.min(s.n,10)/10*30)); // 정확도 70% + 경험 30%
  return {n:s.n,avg:avg,score:score}; }
var PILLARS=[
  {id:'listening',nm:'듣기',face:'quokka_listen',c:'--m-listen'},
  {id:'focus',nm:'집중',face:'friend_owl',c:'--m-focus'},
  {id:'speed',nm:'속도',face:'friend_rabbit',c:'--m-speed'},
  {id:'challenge',nm:'도전',face:'friend_hedgehog',c:'--m-challenge'},
  {id:'grit',nm:'끈기',face:'friend_turtle',c:'--m-grit'},
  {id:'calm',nm:'진정',face:'quokka_calm',c:'--m-calm'}
];
var pc=document.getElementById('pillars');
PILLARS.forEach(function(pl){ var info=pInfo(pl.id);
  var el=document.createElement('div');el.className='pill'+(info.n?'':' lock');el.style.setProperty('--mc','var('+pl.c+')');
  var st=info.n?(info.n+'회'+(info.avg!=null?' · 평균 '+info.avg+'%':'')):'아직 안 했어요';
  el.innerHTML='<div class="face"><img src="assets/mascot/web/'+pl.face+'.png" alt=""></div><div class="body"><div class="nm">'+pl.nm+'</div><div class="bar"><div class="fill" style="width:'+info.score+'%"></div></div><div class="st">'+st+'</div></div>';
  pc.appendChild(el);
});

// 뱃지
var BADGES={'first-listening':['<img class="ico" src="assets/icons/headset.png" alt="">','첫 듣기'],'streak-3':['<img class="ico" src="assets/icons/flame.png" alt="">','3일 연속'],'streak-7':['<img class="ico" src="assets/icons/flame.png" alt="">','7일 연속'],'week-quota':['<img class="ico" src="assets/icons/trophy.png" alt="">','주간 달성']};
var earned=p.badges||[], bg=document.getElementById('badges');
Object.keys(BADGES).forEach(function(id){var b=BADGES[id],on=earned.indexOf(id)>-1;
  var el=document.createElement('div');el.className='badge'+(on?'':' off');el.innerHTML='<div class="bi">'+b[0]+'</div><div class="bl">'+b[1]+'</div>';bg.appendChild(el);});

// ── 종합 능력치 (육각 레이더) ──
function drawRadar(values,labels){
  var sz=250,cx=sz/2,cy=sz/2+4,R=82,n=values.length,i,a,r,pts;
  var s='<svg viewBox="0 0 '+sz+' '+(sz+8)+'" width="100%" style="max-width:300px;display:block;margin:0 auto">';
  for(var ring=1;ring<=4;ring++){ r=R*ring/4; pts=[];
    for(i=0;i<n;i++){ a=Math.PI*2*i/n-Math.PI/2; pts.push((cx+r*Math.cos(a)).toFixed(1)+','+(cy+r*Math.sin(a)).toFixed(1)); }
    s+='<polygon points="'+pts.join(' ')+'" fill="none" stroke="#E6ECF3" stroke-width="1"/>'; }
  for(i=0;i<n;i++){ a=Math.PI*2*i/n-Math.PI/2;
    s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+R*Math.cos(a)).toFixed(1)+'" y2="'+(cy+R*Math.sin(a)).toFixed(1)+'" stroke="#E6ECF3" stroke-width="1"/>';
    s+='<text x="'+(cx+(R+18)*Math.cos(a)).toFixed(1)+'" y="'+(cy+(R+18)*Math.sin(a)+4).toFixed(1)+'" font-size="11.5" fill="#6B7685" text-anchor="middle" font-family="Jua,sans-serif">'+labels[i]+'</text>'; }
  var dp=[];
  for(i=0;i<n;i++){ a=Math.PI*2*i/n-Math.PI/2; r=R*Math.max(0,Math.min(100,values[i]))/100; dp.push((cx+r*Math.cos(a)).toFixed(1)+','+(cy+r*Math.sin(a)).toFixed(1)); }
  s+='<polygon points="'+dp.join(' ')+'" fill="rgba(76,130,232,.22)" stroke="#4C82E8" stroke-width="2.5" stroke-linejoin="round"/>';
  for(i=0;i<n;i++){ a=Math.PI*2*i/n-Math.PI/2; r=R*Math.max(0,Math.min(100,values[i]))/100; s+='<circle cx="'+(cx+r*Math.cos(a)).toFixed(1)+'" cy="'+(cy+r*Math.sin(a)).toFixed(1)+'" r="3.5" fill="#4C82E8"/>'; }
  return s+'</svg>';
}
document.getElementById('radar').innerHTML=drawRadar(PILLARS.map(function(pl){return pInfo(pl.id).score;}),['듣기','집중','속도','도전','끈기','진정']);

// ── 정답률 추이 (세션/주간/월간) ──
function drawLine(series){
  if(!series||!series.length) return '<div class="muted" style="padding:20px 0">아직 추이 데이터가 부족해요</div>';
  var W=340,H=158,padL=20,padB=22,padT=12,n=series.length,i;
  var s='<svg viewBox="0 0 '+W+' '+H+'" width="100%">';
  [0,50,100].forEach(function(v){ var y=padT+(H-padT-padB)*(1-v/100); s+='<line x1="'+(padL+4)+'" y1="'+y.toFixed(1)+'" x2="'+(W-8)+'" y2="'+y.toFixed(1)+'" stroke="#EEF2F7" stroke-width="1"/>'; s+='<text x="2" y="'+(y+3).toFixed(1)+'" font-size="9" fill="#9AA7B5">'+v+'</text>'; });
  var step=(W-padL-26)/Math.max(1,n-1),co=[];
  for(i=0;i<n;i++){ var x=(n===1)?(W+padL)/2:(padL+14+i*step); var y=padT+(H-padT-padB)*(1-Math.max(0,Math.min(100,series[i].y))/100); co.push({x:x,y:y}); }
  if(n>1){ var d='M '+co[0].x.toFixed(1)+' '+co[0].y.toFixed(1); for(i=1;i<n;i++) d+=' L '+co[i].x.toFixed(1)+' '+co[i].y.toFixed(1); s+='<path d="'+d+'" fill="none" stroke="#4C82E8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>'; }
  for(i=0;i<n;i++){ s+='<circle cx="'+co[i].x.toFixed(1)+'" cy="'+co[i].y.toFixed(1)+'" r="4" fill="#fff" stroke="#4C82E8" stroke-width="2.5"/>'; s+='<text x="'+co[i].x.toFixed(1)+'" y="'+(H-7)+'" font-size="9" fill="#9AA7B5" text-anchor="middle">'+series[i].x+'</text>'; }
  return s+'</svg>';
}
function aggTrend(mode){
  var c=comp.filter(function(e){return typeof e.overallAccuracy==='number';});
  if(!c.length) return [];
  if(mode==='session') return c.slice(-10).map(function(e,i){return {x:String(i+1), y:Math.round(e.overallAccuracy*100)};});
  var g={};
  c.forEach(function(e){ var d=new Date(e.ts),key,label;
    if(mode==='week'){ var m=monday(d); key=ymd(m); label=(m.getMonth()+1)+'/'+m.getDate(); }
    else { key=d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2); label=(d.getMonth()+1)+'월'; }
    if(!g[key])g[key]={s:0,n:0,l:label}; g[key].s+=e.overallAccuracy*100; g[key].n++; });
  return Object.keys(g).sort().slice(-8).map(function(k){return {x:g[k].l, y:Math.round(g[k].s/g[k].n)};});
}
function renderTrend(m){ document.getElementById('trend').innerHTML=drawLine(aggTrend(m)); }
var seg=document.getElementById('trendSeg');
seg.addEventListener('click',function(e){ var b=e.target.closest('button'); if(!b)return;
  [].forEach.call(seg.querySelectorAll('button'),function(x){x.classList.remove('on');}); b.classList.add('on');
  renderTrend(b.getAttribute('data-m')); });
renderTrend('session');
</script>
