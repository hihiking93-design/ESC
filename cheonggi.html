<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ESC · 청기백기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="shared/esc.css?v=3">
<script src="shared/telemetry.js"></script>
<script src="shared/progress.js?v=2"></script>
<script src="shared/tips.js?v=1"></script>
<script src="shared/sfx.js?v=1"></script>
<script src="shared/fx.js?v=1"></script>
<style>
  body{overflow:hidden}
  .gwrap{max-width:460px;margin:0 auto;height:100vh;display:flex;flex-direction:column;padding:14px 16px;position:relative}
  body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(48px);z-index:-1;opacity:.55;pointer-events:none}
  body::before{width:320px;height:320px;background:rgba(76,130,232,.20);top:-70px;left:-90px;animation:bg1 9s ease-in-out infinite}
  body::after{width:280px;height:280px;background:rgba(47,184,166,.18);bottom:-50px;right:-80px;animation:bg2 11s ease-in-out infinite}
  @keyframes bg1{50%{transform:translate(34px,46px)}}
  @keyframes bg2{50%{transform:translate(-34px,-32px)}}
  .ghud{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .ghud .x{width:42px;height:42px;border-radius:50%;background:#fff;border:none;box-shadow:0 4px 10px rgba(35,43,54,.14);font-size:18px;cursor:pointer;flex:none}
  .prog{flex:1;height:14px;border-radius:999px;background:rgba(40,48,59,.12);overflow:hidden}
  .prog .fill{height:100%;border-radius:999px;background:var(--m-listen);width:0;transition:width .2s}
  .pn{font-family:var(--f-num);font-weight:700;font-size:15px;color:var(--ink-soft);min-width:48px;text-align:right}
  .commander{display:flex;flex-direction:column;align-items:center;gap:8px;margin:2px 0 4px}
  .commander .eco{width:84px}
  .cmd{font-family:var(--f-display);font-size:clamp(30px,9vw,42px);min-height:52px;transition:transform .06s}
  .cmd.go{transform:scale(1.08)} .cmd.bad{animation:csh .3s}
  @keyframes csh{0%,100%{transform:translateX(0)}30%{transform:translateX(-7px)}70%{transform:translateX(7px)}}
  .charstage{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
  .charstage img{max-height:100%;max-width:86%;object-fit:contain;filter:drop-shadow(0 8px 14px rgba(35,43,54,.16))}
  .charstage img.pop{animation:spritepop .32s cubic-bezier(.3,1.4,.5,1)}
  @keyframes spritepop{0%{transform:scale(.93)}55%{transform:scale(1.06)}100%{transform:scale(1)}}
  .taprow{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:4px}
  .tapbtn{height:62px;border-radius:18px;border:none;font-family:var(--f-display);font-size:22px;cursor:pointer;color:#fff;-webkit-tap-highlight-color:transparent;transition:transform .07s,box-shadow .07s}
  .tapbtn:active{transform:translateY(6px);box-shadow:none}
  .tapbtn.blue{background:linear-gradient(135deg,#5B8DEC,#4C82E8);box-shadow:0 6px 0 #3A66C4}
  .tapbtn.white{background:#fff;color:#5A6676;border:2px solid #E3E8EF;box-shadow:0 6px 0 #CFD9E5}
  .ghint{text-align:center;color:var(--ink-soft);font-size:12px;margin-top:8px}
</style>
</head>
<body>

<div class="ob" id="intro" style="z-index:80;gap:16px">
  <div class="eco bob" style="width:138px"><img src="assets/mascot/web/quokka_greet.png" alt="에코"></div>
  <div class="bubble" style="max-width:330px;font-size:16px"><b id="introNick" style="color:var(--m-listen)">학생</b>, 청기백기! 잘 듣고 빠르게 <img class="ico" src="assets/icons/flag.png" alt=""></div>
  <div class="tipcard" id="introTip" style="border-left-color:var(--m-listen)"></div>
  <button class="btn3d" id="introStart">시작하기 →</button>
</div>

<div class="gwrap" id="game" style="display:none">
  <div class="ghud">
    <button class="x" onclick="location.href='index.html'" aria-label="나가기">✕</button>
    <div class="prog"><div class="fill" id="prog"></div></div>
    <div class="pn" id="pn">0/24</div>
  </div>
  <div class="commander">
    <div class="cmd" id="cmd">준비…</div>
  </div>
  <div class="charstage"><img id="ecoSprite" src="assets/mascot/cheonggi/both_down.png" alt="에코"></div>
  <div class="taprow">
    <button class="tapbtn blue" id="blueBtn">청기</button>
    <button class="tapbtn white" id="whiteBtn">백기</button>
  </div>
  <div class="ghint">지시대로 깃발을 올리고/내려요. <b style="color:var(--m-listen)">"…지마"</b>는 함정 — 가만히!</div>
</div>

<div class="screen" id="result" style="display:none"></div>

<script>
var TOTAL=24, cmdN=0, correct=0, blueUp=false, whiteUp=false, curCmd=null, active=false, winTimer=null;
var cmdEl=document.getElementById('cmd'), prog=document.getElementById('prog'), pn=document.getElementById('pn'),
    sprite=document.getElementById('ecoSprite');
['both_down','blue_up','white_up','both_up'].forEach(function(n){ var im=new Image(); im.src='assets/mascot/cheonggi/'+n+'.png'; });
function stateName(){ return (blueUp&&whiteUp)?'both_up':(blueUp?'blue_up':(whiteUp?'white_up':'both_down')); }
function render(){ sprite.src='assets/mascot/cheonggi/'+stateName()+'.png'; sprite.classList.remove('pop'); void sprite.offsetWidth; sprite.classList.add('pop'); }
// 하준(Typecast) 잼민이 음성 클립 재생 — 디바이스 보이스 의존 X
var VOICES={};
['cheong_up','cheong_down','baek_up','baek_down','cheong_up_no','cheong_down_no','baek_up_no','baek_down_no'].forEach(function(k){
  var a=new Audio('assets/audio/cheonggi/voice/'+k+'.mp3'); a.preload='auto'; VOICES[k]=a;
});
function speak(c){ if(window.SFX&&SFX.muted())return; try{
  var k=(c.flag==='blue'?'cheong':'baek')+'_'+c.dir+(c.neg?'_no':'');
  var a=VOICES[k]; if(a){ a.pause(); a.currentTime=0; a.play().catch(function(){}); }
}catch(e){} }
function gen(){
  var neg=Math.random()<0.35;
  var flag=Math.random()<0.5?'blue':'white';
  var up=(flag==='blue')?blueUp:whiteUp;
  var dir=up?'down':'up';                 // 상태를 바꾸는 방향(반사 유발)
  var fw=(flag==='blue')?'청기':'백기';
  var text=neg ? (fw+(dir==='up'?' 올리지마':' 내리지마')) : (fw+(dir==='up'?' 올려!':' 내려!'));
  return {text:text, flag:flag, dir:dir, neg:neg, correct: neg?'none':(flag+':'+dir)};
}
function next(){
  cmdN++;
  if(cmdN>TOTAL){ endGame(); return; }
  pn.textContent=cmdN+'/'+TOTAL; prog.style.width=Math.round((cmdN-1)/TOTAL*100)+'%';
  curCmd=gen(); cmdEl.textContent=curCmd.text; cmdEl.className='cmd'; active=true; speak(curCmd);
  var win=Math.max(950, 1750-(cmdN*32));
  winTimer=setTimeout(function(){
    if(!active) return; active=false;
    if(curCmd.neg){ correct++; cmdEl.className='cmd go'; if(window.SFX)SFX.play('correct'); }  // 잘 참음
    else { cmdEl.className='cmd bad'; if(window.SFX)SFX.play('wrong'); }                          // 놓침
    setTimeout(next, 360);
  }, win);
}
function tapFlag(flag){
  if(flag==='blue') blueUp=!blueUp; else whiteUp=!whiteUp; render();   // 항상 즉시 반응(반응성)
  if(!active){ if(window.SFX)SFX.play('select'); return; }              // 점수는 활성 윈도우에서만
  active=false; clearTimeout(winTimer);
  var dir=((flag==='blue')?blueUp:whiteUp)?'up':'down';
  var ok=(curCmd.correct===(flag+':'+dir));   // 부정 명령(correct='none')이면 어떤 탭도 오답
  if(ok){ correct++; cmdEl.className='cmd go'; if(window.SFX)SFX.play('correct'); }
  else { cmdEl.className='cmd bad'; if(window.SFX)SFX.play('wrong'); }
  setTimeout(next, ok?150:320);
}
document.getElementById('blueBtn').addEventListener('pointerdown',function(e){ e.preventDefault(); tapFlag('blue'); });
document.getElementById('whiteBtn').addEventListener('pointerdown',function(e){ e.preventDefault(); tapFlag('white'); });

function startGame(){
  document.getElementById('intro').classList.add('hide');
  setTimeout(function(){ document.getElementById('intro').style.display='none'; },420);
  document.getElementById('game').style.display='flex';
  cmdN=0; correct=0; blueUp=false; whiteUp=false; render();
  ESCT.log('session_started',{mode:'focus',game:'cheonggi'});
  setTimeout(next, 600);
}
function endGame(){
  prog.style.width='100%';
  var acc=Math.min(100,Math.round(correct/TOTAL*100));
  ESCT.log('session_completed',{mode:'focus',game:'cheonggi',overallAccuracy:acc/100,correct:correct,completed:true});
  var rw=null; try{ rw=ESCProgress.recordSession('focus'); }catch(e){}
  if(window.SFX)SFX.play('complete');
  var fb = acc>=85 ? '함정("…지마")에 안 속고 잘 따라왔어! 듣고 참는 집중이 멋져 <img class="ico" src="assets/icons/flag.png" alt="">' : acc>=55 ? '"…지마"가 나오면 손을 딱 멈추는 게 포인트야!' : '끝까지 듣고 움직이면 안 속아 — 다시 해보자!';
  document.getElementById('game').style.display='none';
  var gained=rw&&rw.gained?rw.gained:0;
  var r=document.getElementById('result'); r.style.display='flex'; if(window.FX)FX.confetti();
  r.innerHTML=
    '<div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin:22px 0 16px">'
    +'<div class="celebrate celebrate-pop"><div class="eco bob" style="width:152px"><img src="assets/mascot/cheonggi/both_up.png" alt=""></div></div>'
    +'<div class="celebrate-pop" style="font-family:Jua,sans-serif;font-size:25px">청기백기 완료! <img class="ico" src="assets/icons/flag.png" alt=""></div></div>'
    +'<div class="statgrid">'
    +'<div class="stat-tile blue"><div class="k"><img class="ico" src="assets/icons/target.png" alt=""> 정확도</div><div class="v">'+acc+'%</div></div>'
    +'<div class="stat-tile green"><div class="k"><img class="ico" src="assets/icons/check.png" alt=""> 정답</div><div class="v">'+correct+'</div></div>'
    +'<div class="stat-tile gold"><div class="k"><img class="ico" src="assets/icons/star.png" alt=""> 획득</div><div class="v">+'+gained+'</div></div>'
    +'</div>'
    +'<div class="bubble" style="margin:6px 0 14px">'+correct+'/'+TOTAL+' · '+fb+'</div>'
    +'<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'
    +'<a class="btn3d" href="cheonggi.html">다시 🔄</a>'
    +'<a class="btn3d ghost" href="index.html">홈으로</a></div>';
}

(function(){
  document.getElementById('introNick').textContent=(localStorage.getItem('esc_nick')||'학생');
  try{ var tip=ESCTips.pickAny();
    document.getElementById('introTip').innerHTML='<div class="tag" style="color:var(--m-listen)">'+ESCTips.icon[tip.t]+' '+ESCTips.tag[tip.t]+'</div><div class="h">'+tip.h+'</div><div class="s">'+tip.s+'</div>';
  }catch(e){}
  document.getElementById('introStart').onclick=startGame;
})();
</script>
</body>
</html>
