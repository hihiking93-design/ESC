<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESC Listening Test</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
<style>
:root {
  --bg: #edf0fa;
  --card: #ffffff;
  --primary: #4361ee;
  --primary-light: #eef0ff;
  --accent: #f72585;
  --success: #06d6a0;
  --text: #1a1a2e;
  --muted: #8892a4;
  --border: #e2e8f0;
  --shadow: 0 16px 64px rgba(13,27,42,0.16), 0 2px 12px rgba(13,27,42,0.06);
  --radius: 20px;
  --dark1: #0d1b2a;
  --dark2: #1b3a6b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: linear-gradient(145deg, #e8ecff 0%, #edf0fa 45%, #e4f0ff 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  width: 100%;
  max-width: 560px;
  padding: 40px 36px;
  animation: fadeUp 0.4s ease;
  overflow: hidden;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.hidden { display: none !important; }

.logo {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 32px;
}
.logo-mark {
  width: 40px; height: 40px;
  background: var(--primary); border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 700; font-size: 15px;
}
.logo-text { font-size: 18px; font-weight: 700; color: var(--text); }
.logo-sub  { font-size: 12px; color: var(--muted); margin-top: 1px; }

.section-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.section-sub   { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }

.input-group { margin-bottom: 16px; }
.input-group label { font-size: 13px; font-weight: 500; color: var(--text); display: block; margin-bottom: 6px; }
.input-group input {
  width: 100%; padding: 12px 16px;
  border: 1.5px solid var(--border); border-radius: 10px;
  font-size: 15px; font-family: inherit; color: var(--text); outline: none;
  transition: border-color 0.2s;
}
.input-group input:focus { border-color: var(--primary); }

.btn {
  width: 100%; padding: 14px;
  border: none; border-radius: 12px;
  font-size: 16px; font-weight: 700;
  font-family: inherit; cursor: pointer;
  transition: transform 0.1s, opacity 0.2s;
}
.btn:active { transform: scale(0.98); }
.btn-primary { background: linear-gradient(135deg, #4361ee 0%, #6a3fc8 100%); color: white; }
.btn-primary:hover { opacity: 0.90; }
.btn-sm {
  width: auto; padding: 8px 18px;
  font-size: 14px; font-weight: 500; border-radius: 8px;
}

/* 진행 바 */
.progress-wrap { margin-bottom: 28px; }
.progress-meta {
  display: flex; justify-content: space-between;
  font-size: 13px; color: var(--muted); margin-bottom: 8px;
}
.progress-bar { height: 6px; background: var(--border); border-radius: 999px; overflow: hidden; }
.progress-fill {
  height: 100%; background: var(--primary); border-radius: 999px;
  transition: width 0.4s ease;
}

/* 상태 표시 영역 — 고정 높이로 레이아웃 안 튀게 */
.status-area {
  height: 46px;
  margin-bottom: 20px;
  position: relative;
}

/* TTS 상태 박스 */
.tts-status {
  position: absolute; inset: 0;
  display: flex; align-items: center; gap: 10px;
  padding: 0 16px; background: var(--primary-light);
  border-radius: 10px; font-size: 14px; color: var(--primary);
  opacity: 1; transition: opacity 0.2s;
}
.tts-status.idle { opacity: 0; pointer-events: none; }

.tts-wave { display: flex; gap: 3px; align-items: flex-end; height: 18px; flex-shrink: 0; }
.tts-wave span {
  width: 3px; background: var(--primary); border-radius: 2px;
  animation: wave 0.8s ease-in-out infinite;
}
.tts-wave span:nth-child(2) { animation-delay: 0.1s; }
.tts-wave span:nth-child(3) { animation-delay: 0.2s; }
.tts-wave span:nth-child(4) { animation-delay: 0.3s; }
@keyframes wave { 0%,100%{height:4px} 50%{height:16px} }

/* 대기 배지 — 같은 자리에 겹쳐서 fade */
.wait-badge {
  position: absolute; inset: 0;
  display: flex; align-items: center; gap: 6px;
  padding: 0 16px; border-radius: 10px;
  font-size: 13px; font-weight: 500;
  background: var(--primary-light); color: var(--primary);
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.wait-badge.show { opacity: 1; pointer-events: auto; }

.badge-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--primary); animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* 보기 */
.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.option {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px;
  border: 2px solid var(--border); border-radius: 12px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  font-size: 15px; color: var(--text);
}
.option:hover:not(.locked) { border-color: var(--primary); background: var(--primary-light); }
.option.selected { border-color: var(--primary); background: var(--primary-light); }
.option.locked   { pointer-events: none; }

/* 듣는 중: 박스/키는 보이고 텍스트만 완전히 숨김 */
.options.listening .option { pointer-events: none; }
.options.listening .option span {
  color: transparent !important;
  user-select: none;
  pointer-events: none;
}
.option-key {
  width: 30px; height: 30px; border-radius: 8px;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s;
}
.option.selected .option-key { background: var(--primary); border-color: var(--primary); color: white; }

/* 결과 */
.score-circle {
  width: 120px; height: 120px; border-radius: 50%;
  border: 6px solid var(--primary);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  margin: 0 auto 24px;
}
.score-num   { font-size: 36px; font-weight: 700; color: var(--primary); line-height: 1; }
.score-total { font-size: 13px; color: var(--muted); margin-top: 2px; }

.result-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px;
}
.result-row:last-child { border-bottom: none; }
.result-badge {
  width: 24px; height: 24px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
}
.result-badge.o { background: #f0fdf9; color: var(--success); }
.result-badge.x { background: #fff0f6; color: var(--accent); }

.divider { height: 1px; background: var(--border); margin: 24px 0; }

.speed-wrap {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px; font-size: 13px; color: var(--muted);
}
.speed-wrap label { font-weight: 500; flex-shrink: 0; }
.speed-wrap input[type=range] {
  flex: 1; height: 4px; -webkit-appearance: none; appearance: none;
  background: var(--border); border-radius: 2px; outline: none;
}
.speed-wrap input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px;
  background: var(--primary); border-radius: 50%; cursor: pointer;
}
.speed-wrap span { font-weight: 700; color: var(--primary); min-width: 36px; text-align: right; }
.level-badge {
  display: inline-block; padding: 2px 8px; border-radius: 6px;
  font-size: 12px; font-weight: 700; color: white; vertical-align: middle;
}
.level-badge.초보 { background: #06d6a0; }
.level-badge.중수 { background: #4361ee; }
.level-badge.고수 { background: #f72585; }

/* ── 결과 분석 화면 ─────────────────────────── */
.verdict-box {
  text-align: center; padding: 20px 0 16px;
}
.verdict-level { margin-bottom: 10px; }
.verdict-level .level-badge { font-size: 15px; padding: 5px 16px; border-radius: 10px; }
.verdict-headline { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.verdict-sub { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 10px; }
.verdict-stat { font-size: 14px; font-weight: 600; color: var(--primary); }

.analysis-section { margin-bottom: 8px; }
.analysis-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  color: var(--muted); text-transform: uppercase; margin-bottom: 10px;
}

.timeline-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0; border-bottom: 1px solid var(--border);
  font-size: 12px; overflow: hidden;
}
.timeline-row:last-child { border-bottom: none; }
.tl-set { color: var(--muted); flex-shrink: 0; width: 40px; }
.tl-badge { flex-shrink: 0; }
.tl-bar { font-size: 13px; letter-spacing: 1px; flex-shrink: 0; }
.tl-bar.초보 { color: #06d6a0; }
.tl-bar.중수 { color: #4361ee; }
.tl-bar.고수 { color: #f72585; }
.tl-score { font-weight: 700; color: var(--text); flex-shrink: 0; width: 28px; text-align: right; }
.tl-judge { color: var(--muted); flex: 1; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.diag-item {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.diag-item:last-child { border-bottom: none; }
.diag-icon { font-size: 18px; flex-shrink: 0; padding-top: 1px; }
.diag-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
.diag-body { font-size: 13px; color: var(--muted); line-height: 1.6; }
.diag-data { font-weight: 600; color: var(--text); }

/* ── 다크 섹션 공통 ─────────────────────────── */
.dark-section {
  background: linear-gradient(160deg, var(--dark1) 0%, var(--dark2) 100%);
  margin: -40px -36px 0;
  position: relative; overflow: hidden;
}
.dark-section::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 110%, rgba(67,97,238,0.28) 0%, transparent 65%);
  pointer-events: none;
}

/* ── 시작 화면 히어로 ─────────────────────────── */
.start-hero {
  padding: 44px 36px 36px;
  text-align: center;
}
.start-emblem {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, #4361ee, #7c3aed);
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 800; font-size: 18px;
  margin: 0 auto 20px;
  box-shadow: 0 6px 24px rgba(67,97,238,0.45);
  position: relative;
}
.start-title {
  font-size: 28px; font-weight: 800; color: #fff;
  letter-spacing: -0.5px; margin-bottom: 8px;
  position: relative;
}
.start-subtitle {
  font-size: 12px; color: #8ba8c4;
  letter-spacing: 0.12em; text-transform: uppercase;
  position: relative;
}
.start-body { padding: 32px 0 0; }
.start-desc {
  font-size: 13px; color: var(--muted);
  line-height: 1.8; text-align: center; margin-bottom: 24px;
}

/* ── 시험 화면 상단바 ─────────────────────────── */
.test-header {
  margin: -40px -36px 0;
  padding: 14px 24px;
  display: flex; align-items: center;
  position: relative;
}
.th-col {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 4px; position: relative;
}
.th-col:first-child { align-items: flex-start; }
.th-col:last-child  { align-items: flex-end; }
.th-label {
  font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
  color: #5d7da8; text-transform: uppercase;
}
.th-val {
  font-size: 16px; font-weight: 800; color: #fff;
  font-variant-numeric: tabular-nums;
}
.th-sep {
  width: 1px; height: 28px;
  background: rgba(255,255,255,0.12);
  margin: 0 12px; flex-shrink: 0;
}
.th-speed {
  display: flex; align-items: center; gap: 6px;
}
.th-speed-val {
  font-size: 14px; font-weight: 700; color: #fff;
  min-width: 34px; text-align: right;
}
.speed-range {
  width: 64px; height: 3px;
  -webkit-appearance: none; appearance: none;
  background: rgba(255,255,255,0.25);
  border-radius: 2px; outline: none; cursor: pointer;
}
.speed-range::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  background: #fff; border-radius: 50%;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  cursor: pointer;
}
.test-prog-bar {
  margin: 0 -36px;
  height: 3px; background: rgba(255,255,255,0.1);
}
.test-prog-fill {
  height: 100%;
  background: linear-gradient(90deg, #4361ee, #7c3aed);
  transition: width 0.4s ease;
}
.test-body-pad { height: 20px; }

/* ── 레벨 변경 플래시 ─────────────────────────── */
.level-flash {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%) translateY(-10px);
  background: linear-gradient(135deg, var(--dark1), var(--dark2));
  color: #fff; padding: 10px 22px;
  border-radius: 100px; font-size: 14px; font-weight: 700;
  box-shadow: 0 6px 24px rgba(13,27,42,0.4);
  z-index: 999; pointer-events: none;
  opacity: 0; transition: opacity 0.25s, transform 0.25s;
  white-space: nowrap;
}
.level-flash.show {
  opacity: 1; transform: translateX(-50%) translateY(0);
}

/* ── 결과 화면 다크 판정 블록 ───────────────────── */
#finalVerdict { margin: -40px -36px 0; }
.verdict-box {
  padding: 36px 36px 28px;
  text-align: center; position: relative;
}
.verdict-eyebrow {
  font-size: 11px; color: #5d7da8;
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 14px; position: relative;
}
.verdict-level { margin-bottom: 12px; position: relative; }
.verdict-level .level-badge { font-size: 15px; padding: 5px 18px; }
.verdict-headline {
  font-size: 22px; font-weight: 800; color: #fff;
  letter-spacing: -0.3px; margin-bottom: 8px; position: relative;
}
.verdict-sub {
  font-size: 13px; color: #8ba8c4;
  line-height: 1.7; margin-bottom: 16px; position: relative;
}
.verdict-stat {
  font-size: 15px; font-weight: 700; color: #60a5fa;
  position: relative; font-variant-numeric: tabular-nums;
}
.verdict-after { height: 28px; }

/* ── 세트별 추이 차트 ─────────────────────────── */
.charts-row {
  display: grid; grid-template-columns: 1fr 108px; gap: 20px;
  align-items: start; margin-bottom: 4px;
}
.chart-sub-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  color: var(--muted); text-transform: uppercase; margin-bottom: 8px;
}

/* ── 지문 위치 바 ─────────────────────────────── */
.qmap-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.qmap-row:last-child { margin-bottom: 0; }
.qmap-label { font-size: 10px; color: var(--muted); width: 16px; text-align: right; flex-shrink: 0; }
.qmap-track { flex: 1; height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
.qmap-fill { height: 100%; border-radius: 99px; }
.qmap-val { font-size: 10px; font-weight: 700; color: var(--text); width: 28px; text-align: right; flex-shrink: 0; }

/* ── 인사이트 카드 ─────────────────────────────── */
.insight-card { padding: 16px 0; border-bottom: 1px solid var(--border); }
.insight-card:last-child { border-bottom: none; }
.insight-kpi {
  display: flex; align-items: center; gap: 8px; margin-bottom: 5px;
}
.insight-num { font-size: 26px; font-weight: 800; color: var(--accent); line-height: 1; }
.insight-tag {
  font-size: 11px; font-weight: 700; color: var(--primary);
  background: var(--primary-light); padding: 2px 9px; border-radius: 20px;
}
.insight-body { font-size: 13px; color: var(--text); line-height: 1.75; }
.insight-em { font-weight: 700; color: var(--text); }

.option.dev-correct { border-color: var(--accent) !important; background: rgba(247,37,133,0.07) !important; }
.option.dev-correct .option-key { background: var(--accent) !important; border-color: var(--accent) !important; color: white !important; }
</style>
</head>
<body>

<!-- 레벨 변경 플래시 -->
<div class="level-flash" id="levelFlash"></div>

<!-- ① 시작 화면 -->
<div class="card" id="startScreen">
  <div class="dark-section start-hero">
    <div class="start-emblem">ESC</div>
    <div class="start-title">Listening Test</div>
  </div>
  <div class="start-body">
    <p class="start-desc">답변 정확도를 실시간으로 분석해<br>난이도와 재생 속도를 자동 조정합니다.</p>
    <div class="input-group">
      <label>이름</label>
      <input type="text" id="studentName" placeholder="홍길동" autofocus>
    </div>
    <button class="btn btn-primary" id="startBtn">진단 시작 →</button>
  </div>
</div>

<!-- ② 시험 화면 -->
<div class="card hidden" id="testScreen">
  <div class="dark-section test-header">
    <div class="th-col">
      <div class="th-label">현재 레벨</div>
      <div id="thLevel"><span class="level-badge 초보">초보</span></div>
    </div>
    <div class="th-sep"></div>
    <div class="th-col">
      <div class="th-label">세트</div>
      <div class="th-val" id="progressText">1</div>
    </div>
    <div class="th-sep"></div>
    <div class="th-col" style="align-items:flex-end;">
      <div class="th-label">재생 속도</div>
      <div class="th-val" id="speedValue">1.0x</div>
    </div>
    <input type="range" id="speedSlider" min="0.6" max="1.5" step="0.1" value="1.0" class="hidden">
  </div>
  <div class="test-prog-bar"><div class="test-prog-fill" id="progressFill" style="width:0%"></div></div>
  <div class="test-body-pad"></div>

  <div class="status-area">
    <div class="tts-status idle" id="ttsStatus">
      <div class="tts-wave"><span></span><span></span><span></span><span></span></div>
      <span id="ttsText">지문을 듣고 있습니다...</span>
    </div>
    <div class="wait-badge" id="waitBadge">
      <div class="badge-dot"></div>
      <span>선택지를 고르세요</span>
    </div>
  </div>

  <div class="options listening" id="optionsWrap"></div>

</div>

<!-- ③ 결과 화면 -->
<div class="card hidden" id="resultScreen">
  <div id="finalVerdict"></div>
  <div class="verdict-after"></div>

  <!-- 차트: 추이 + 지문 위치 -->
  <div class="charts-row">
    <div>
      <div class="chart-sub-label">세트별 정답률</div>
      <div id="journeyChart"></div>
    </div>
    <div>
      <div class="chart-sub-label">지문 위치별</div>
      <div id="qMap"></div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="analysis-section">
    <div class="analysis-label">알고리즘의 진단</div>
    <div id="insightSection"></div>
  </div>

  <div class="divider"></div>

  <div class="analysis-section">
    <div class="analysis-label">판정 흐름</div>
    <div id="timelineList"></div>
  </div>

  <div class="divider"></div>

  <div style="display:flex;gap:10px;">
    <button class="btn btn-primary" id="imageBtn">캡처 🖼️</button>
    <button class="btn btn-primary" id="downloadBtn">저장 📥</button>
    <button class="btn btn-sm btn-primary" id="retryBtn"
      style="background:#f1f3ff;color:var(--primary);flex-shrink:0;">다시하기</button>
  </div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 스크립트 데이터 (TTS용 지문 포함)

// MP3 재생
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let currentAudio = null;
function playMP3(url, onEnd) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }

  let done = false;
  function finish() {
    if (done) return;
    done = true;
    currentAudio = null;
    if (onEnd) onEnd();
  }

  currentAudio = new Audio(url);
  const slider = document.getElementById('speedSlider');
  const rate = (typeof DEV !== 'undefined' && DEV.on) ? 16 : parseFloat(slider?.value || 1);
  currentAudio.playbackRate = rate;
  currentAudio.onended = finish;
  currentAudio.onerror = () => { console.warn('오디오 로드 실패:', url); finish(); };

  // 인앱 브라우저: onended 미발생 대비 — 재생 시간 기반 타임아웃
  currentAudio.onloadedmetadata = () => {
    const wait = Math.ceil(currentAudio.duration / rate * 1000) + 4000;
    setTimeout(() => { if (!done) finish(); }, wait);
  };
  // 메타데이터도 못 가져올 경우 최대 60초 대기
  setTimeout(() => { if (!done) finish(); }, 60000);

  // play() Promise rejection 처리 (인앱 브라우저 autoplay 차단)
  const p = currentAudio.play();
  if (p && p.catch) p.catch(err => { console.warn('재생 실패:', err); finish(); });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 적응형 세트 선택
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const MAX_SETS = 5, MIN_SETS = 3;
let pools = {};
let currentLevel = '중수';
let consecutiveHighPass = 0;
let perfectClear = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initPools() {
  pools = {
    '초보': shuffle(LOW),
    '중수': shuffle(MID),
    '고수': shuffle(HIGH),
  };
}

function pickNextSet() {
  if (pools[currentLevel] && pools[currentLevel].length > 0)
    return pools[currentLevel].shift();
  const levels = ['초보', '중수', '고수'];
  for (const lvl of levels) {
    if (pools[lvl].length > 0) return pools[lvl].shift();
  }
  return null;
}

function getSetAccuracy() {
  const setNum = index + 1;
  const sr = resultData.filter(r => r.세트 === setNum);
  return sr.length === 0 ? 0 : sr.filter(r => r.결과 === 'O').length / sr.length;
}

function adaptLevel() {
  const acc = getSetAccuracy();
  const completedLevel = questions[index]._level;
  const prevLevel = currentLevel;
  perfectClear = false;
  shuffleQuestions = acc >= 0.75;

  if (acc === 1) {
    if (completedLevel === '고수') { perfectClear = true; }
    else {
      if (currentLevel === '초보') currentLevel = '중수';
      else if (currentLevel === '중수') currentLevel = '고수';
    }
    consecutiveHighPass = 0;
    currentSpeed = Math.min(SPEED_MAX, Math.round((currentSpeed + 0.1) * 10) / 10);
    if (perfectClear) return;
  } else if (acc >= 0.75) {
    // 75%+: 레벨 올리되 고수는 2연속 통과 필요
    if (completedLevel === '고수') consecutiveHighPass++;
    else consecutiveHighPass = 0;
    if (currentLevel === '초보') currentLevel = '중수';
    else if (currentLevel === '중수') currentLevel = '고수';
    currentSpeed = Math.min(SPEED_MAX, Math.round((currentSpeed + 0.1) * 10) / 10);
  } else if (acc < 0.5) {
    consecutiveHighPass = 0;
    if (currentLevel === '고수') currentLevel = '중수';
    else if (currentLevel === '중수') currentLevel = '초보';
    currentSpeed = Math.max(SPEED_MIN, Math.round((currentSpeed - 0.1) * 10) / 10);
  } else {
    // 50~74%: 현재 레벨·속도 유지
    consecutiveHighPass = 0;
  }

  // 레벨 변경 플래시
  if (currentLevel !== prevLevel) {
    const levels = ['초보','중수','고수'];
    const arrow = levels.indexOf(currentLevel) > levels.indexOf(prevLevel) ? '▲' : '▼';
    showLevelFlash(`${arrow} ${currentLevel} 레벨 진입`);
    updateTestHeader();
  }
}

function shouldStop() {
  if (perfectClear) return true;
  const done = index + 1;
  if (done >= MAX_SETS) return true;
  if (done >= MIN_SETS && consecutiveHighPass >= 2) return true;
  return Object.values(pools).every(p => p.length === 0);
}

function countQ(set) {
  let n = 0; while (set[`q${n+1}`]) n++; return n;
}

// 상태
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const SPEED_MIN = 0.6, SPEED_MAX = 1.5;
let currentSpeed = 1.0;
let questions = [], index = 0, currentQIdx = 0, totalQ = 0;
let currentSetOrder = [1,2,3,4];
let shuffleQuestions = false;
let studentName = '';
let resultData = [];
let setHistory = [];

function showScreen(id) {
  ['startScreen','testScreen','resultScreen'].forEach(s =>
    document.getElementById(s).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

let _flashTimer = null;
function showLevelFlash(text) {
  const el = document.getElementById('levelFlash');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(_flashTimer);
  _flashTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

function updateTestHeader() {
  const el = document.getElementById('thLevel');
  if (el) el.innerHTML = `<span class="level-badge ${currentLevel}">${currentLevel}</span>`;
}

function applySpeed(speed) {
  currentSpeed = Math.min(SPEED_MAX, Math.max(SPEED_MIN, Math.round(speed * 10) / 10));
  const slider = document.getElementById('speedSlider');
  const label  = document.getElementById('speedValue');
  if (slider) slider.value = currentSpeed;
  if (label)  label.textContent = currentSpeed.toFixed(1) + 'x';
  if (currentAudio) currentAudio.playbackRate = currentSpeed;
}

function setListening(text) {
  document.getElementById('ttsText').textContent = text;
  document.getElementById('ttsStatus').classList.remove('idle');
  document.getElementById('waitBadge').classList.remove('show');
  document.getElementById('optionsWrap').classList.add('listening');
}
function setWaiting() {
  document.getElementById('ttsStatus').classList.add('idle');
  document.getElementById('waitBadge').classList.add('show');
  document.getElementById('optionsWrap').classList.remove('listening');
}

// 시작
document.getElementById('startBtn').onclick = () => {
  const name = document.getElementById('studentName').value.trim();
  if (!name) return alert('이름을 입력하세요.');
  studentName = name;
  initPools();
  currentLevel = '초보';
  currentSpeed = 1.0;
  consecutiveHighPass = 0;
  perfectClear = false;
  shuffleQuestions = false;
  questions = [];
  resultData = [];
  setHistory = [];
  const firstSet = pickNextSet();
  if (!firstSet) return alert('문제가 없습니다.');
  questions.push(firstSet);
  index = 0; currentQIdx = 0;
  showScreen('testScreen');
  startSet();
};

function startSet() {
  const set = questions[index];
  currentQIdx = 0;
  totalQ = countQ(set);
  const base = Array.from({length: totalQ}, (_, i) => i + 1);
  currentSetOrder = shuffleQuestions ? shuffle(base) : base;

  // 진행 바 + 헤더 업데이트
  const pct = Math.round((index / MAX_SETS) * 100);
  document.getElementById('progressText').textContent = index + 1;
  document.getElementById('progressFill').style.width = pct + '%';
  updateTestHeader();

  applySpeed(currentSpeed);
  setListening('지문을 듣고 있습니다...');
  buildOptions();

  // 지문 mp3 재생 → 완료 후 질문 mp3
  const passageURL = getBase(set._level) + set.audio_id + '_passage.mp3';
  playMP3(passageURL, playQuestion);
}

function buildOptions() {
  const set = questions[index];
  const n = currentSetOrder[currentQIdx];
  const keys = ['A','B','C','D','E'];

  const opts = keys.map(k => ({
    key: k,
    text: set[`${k}${n}`] || (k === 'E' ? '모르겠음' : '')
  })).filter(o => o.text);

  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  opts.forEach(opt => {
    const div = document.createElement('div');
    div.className = 'option locked';
    div.innerHTML = `<div class="option-key">${opt.key}</div><span>${opt.text}</span>`;
    div.dataset.text = opt.text;
    wrap.appendChild(div);
  });
}

function playQuestion() {
  const set = questions[index];
  const qNum = currentSetOrder[currentQIdx];
  const qText = set[`q${qNum}`];

  setListening('질문을 듣고 있습니다...');

  if (currentQIdx > 0) buildOptions();

  const qURL = getBase(set._level) + set.audio_id + '_q' + qNum + '.mp3';
  playMP3(qURL, () => {
    setWaiting();
    unlockOptions();
  });
}

function unlockOptions() {
  const set = questions[index];
  const n = currentSetOrder[currentQIdx];
  const correctKey = set[`answer${n}`];
  const keys = ['A','B','C','D','E'];
  const opts = keys.map(k => ({
    key: k,
    text: set[`${k}${n}`] || (k === 'E' ? '모르겠음' : '')
  })).filter(o => o.text);

  window._correctText = opts.find(o => o.key === correctKey)?.text || '';

  document.querySelectorAll('.option').forEach(div => {
    div.classList.remove('locked');
    div.onclick = () => handleAnswer(div, div.dataset.text);
  });
  highlightAnswer();
}

function handleAnswer(clicked, chosenText) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }

  document.querySelectorAll('.option').forEach(o => {
    o.classList.add('locked'); o.onclick = null;
  });
  clicked.classList.remove('locked');
  clicked.classList.add('selected');

  const set = questions[index];
  resultData.push({
    이름: studentName,
    단계: set._level,
    세트: index + 1,
    문항: currentQIdx + 1,
    지문위치: currentSetOrder[currentQIdx],
    셔플: shuffleQuestions,
    선택: chosenText,
    정답: window._correctText,
    결과: chosenText === window._correctText ? 'O' : 'X'
  });

  setTimeout(() => {
    if (currentQIdx < totalQ - 1) {
      currentQIdx++;
      playQuestion();
    } else {
      adaptLevel();

      // 세트별 이력 기록
      const sn = index + 1;
      const sr = resultData.filter(r => r.세트 === sn);
      const sc = sr.filter(r => r.결과 === 'O').length;
      const st = sr.length;
      const sa = st > 0 ? sc / st : 0;
      const cl = questions[index]._level;
      let 판정;
      if (sa === 1) {
        판정 = cl === '고수' ? '만점 → 시험 종료' : `만점 → ${currentLevel} 승급`;
      } else if (sa >= 0.75) {
        판정 = currentLevel !== cl ? `우수 → ${currentLevel} 승급` : '우수 → 레벨 유지';
      } else if (sa >= 0.5) {
        판정 = '보통 → 레벨 유지';
      } else {
        판정 = currentLevel !== cl ? `미흡 → ${currentLevel} 하향` : '미흡 → 최저 레벨';
      }
      setHistory.push({ 세트: sn, 난이도: cl, 정답: `${sc}/${st}`, 정답률: Math.round(sa * 100), 판정 });

      if (shouldStop()) { showResult(); }
      else {
        const next = pickNextSet();
        if (!next) { showResult(); return; }
        questions.push(next);
        index++;
        startSet();
      }
    }
  }, 700);
}

function showResult() {
  showScreen('resultScreen');

  const total   = resultData.length;
  const correct = resultData.filter(r => r.결과 === 'O').length;
  const nSets   = setHistory.length;
  const finalLevel = setHistory[nSets - 1]?.난이도 || '-';
  const finalJudge = setHistory[nSets - 1]?.판정 || '';

  // ── 최종 판정 ──────────────────────────────
  let headline, sub;
  if (finalJudge.includes('시험 종료')) {
    headline = '고수 만점 · 시험 종료';
    sub = '고수 문제를 모두 맞히며 알고리즘이 시험을 즉시 종료했습니다.';
  } else if (finalLevel === '고수' && nSets <= 5) {
    headline = '상위권 · 빠른 판정';
    sub = `${nSets}세트 만에 고수 레벨까지 도달했습니다.`;
  } else if (finalLevel === '고수') {
    headline = '상위권 도달';
    sub = `${nSets}세트 끝에 고수 레벨에 안착했습니다.`;
  } else if (finalLevel === '중수' && nSets >= 8) {
    headline = '경계선 실력';
    sub = `${nSets}세트 동안 알고리즘이 판정을 고민했습니다. 중수·고수 경계에 위치한 실력입니다.`;
  } else if (finalLevel === '중수') {
    headline = '중수 레벨 확인';
    sub = '중수 문제에서 실력이 확인됐습니다.';
  } else if (nSets >= 8) {
    headline = '경계선 실력';
    sub = `${nSets}세트 끝에 초보로 마무리됐습니다. 중수 진입을 위한 기초를 다질 단계입니다.`;
  } else {
    headline = '초보 레벨 확인';
    sub = '초보 단계에서 실력이 확인됐습니다.';
  }

  document.getElementById('finalVerdict').innerHTML = `
    <div class="dark-section verdict-box">
      <div class="verdict-eyebrow">${studentName} 님의 진단 결과</div>
      <div class="verdict-level"><span class="level-badge ${finalLevel}">${finalLevel}</span></div>
      <div class="verdict-headline">${headline}</div>
      <div class="verdict-sub">${sub}</div>
      <div class="verdict-stat">${correct} / ${total} 정답 · ${nSets}세트</div>
    </div>`;

  // ── 차트 ──────────────────────────────────
  document.getElementById('journeyChart').innerHTML = buildJourneyChart();
  document.getElementById('qMap').innerHTML = buildQMap();

  // ── 인사이트 ───────────────────────────────
  document.getElementById('insightSection').innerHTML = buildInsights();

  // ── 타임라인 ───────────────────────────────
  document.getElementById('timelineList').innerHTML = setHistory.map(h => {
    const [sc, st] = h.정답.split('/').map(Number);
    const bar = Array.from({length: st}, (_, i) => i < sc ? '●' : '○').join('');
    return `
      <div class="timeline-row">
        <span class="tl-set">세트 ${h.세트}</span>
        <span class="tl-badge"><span class="level-badge ${h.난이도}" style="font-size:10px;padding:1px 6px;">${h.난이도}</span></span>
        <span class="tl-bar ${h.난이도}">${bar}</span>
        <span class="tl-score">${h.정답률}%</span>
        <span class="tl-judge">${h.판정}</span>
      </div>`;
  }).join('');
}

// ── 세트별 추이 SVG 차트 ───────────────────────
function buildJourneyChart() {
  const data = setHistory.map(h => ({ acc: h.정답률, lv: h.난이도, s: h.세트 }));
  const n = data.length;
  if (!n) return '';

  const W = 440, H = 112;
  const pL = 26, pR = 8, pT = 10, pB = 22;
  const pw = W - pL - pR, ph = H - pT - pB;
  const lc = { '초보': '#06d6a0', '중수': '#4361ee', '고수': '#f72585' };
  const xf = i => pL + (n === 1 ? pw / 2 : (i / (n - 1)) * pw);
  const yf = a => pT + ph - (a / 100) * ph;

  // 75% / 50% 기준선
  const lines = [
    { v: 75, label: '75%', dash: '5,3', color: '#4361ee' },
    { v: 50, label: '50%', dash: '3,3', color: '#cbd5e1' },
  ].map(t => `
    <line x1="${pL}" y1="${yf(t.v)}" x2="${W - pR}" y2="${yf(t.v)}"
      stroke="${t.color}" stroke-width="1" stroke-dasharray="${t.dash}" opacity="0.5"/>
    <text x="${pL - 3}" y="${yf(t.v) + 3.5}" text-anchor="end"
      font-size="7.5" fill="${t.color}" opacity="0.8">${t.label}</text>`).join('');

  // 면적 채우기
  const areaPts = [
    `${xf(0)},${H - pB}`,
    ...data.map((d, i) => `${xf(i)},${yf(d.acc)}`),
    `${xf(n - 1)},${H - pB}`,
  ].join(' ');

  // 선 + 점 + 세트번호
  const pts = data.map((d, i) => `${xf(i)},${yf(d.acc)}`).join(' ');
  const dots = data.map((d, i) => `
    <circle cx="${xf(i)}" cy="${yf(d.acc)}" r="5"
      fill="${lc[d.lv]}" stroke="white" stroke-width="1.5"/>
    <text x="${xf(i)}" y="${H - 5}" text-anchor="middle" font-size="8" fill="#94a3b8">${d.s}</text>`).join('');

  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible;">
    <defs>
      <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#4361ee" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="#4361ee" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${lines}
    <polygon points="${areaPts}" fill="url(#ag)"/>
    <polyline points="${pts}" fill="none" stroke="#4361ee" stroke-width="2" stroke-linejoin="round"/>
    ${dots}
  </svg>`;
}

// ── 지문 위치별 바 차트 ─────────────────────────
function buildQMap() {
  const rows = [1, 2, 3, 4].map(p => {
    const items = resultData.filter(r => r.지문위치 === p);
    if (!items.length) return null;
    const acc = Math.round(items.filter(r => r.결과 === 'O').length / items.length * 100);
    const color = acc >= 75 ? '#06d6a0' : acc >= 50 ? '#4361ee' : '#f72585';
    const lbl = `Q${p}`;
    return { lbl, acc, color };
  }).filter(Boolean);

  return rows.map(r => `
    <div class="qmap-row">
      <span class="qmap-label">${r.lbl}</span>
      <div class="qmap-track"><div class="qmap-fill" style="width:${r.acc}%;background:${r.color};"></div></div>
      <span class="qmap-val">${r.acc}%</span>
    </div>`).join('');
}

// ── 인사이트 (날카로운 진단) ──────────────────────
function buildInsights() {
  const cards = [];
  const nSets = setHistory.length;
  const finalJudge = setHistory[nSets - 1]?.판정 || '';
  const transitions = setHistory.filter((h, i) => i > 0 && h.난이도 !== setHistory[i - 1].난이도).length;

  // 1. 수렴 속도
  if (finalJudge.includes('시험 종료')) {
    cards.push({ num: '만점', tag: '즉시 종료',
      body: '고수 레벨 문제를 전부 맞혔습니다. 알고리즘이 더 이상 테스트할 필요가 없다고 판단해 시험을 즉시 종료했어요.' });
  } else if (nSets <= 4) {
    cards.push({ num: `${nSets}세트`, tag: '조기 수렴',
      body: `알고리즘이 <span class="insight-em">${nSets}세트</span> 만에 판정을 확정했습니다. 실력이 특정 레벨에 선명하게 맞아떨어졌어요.` });
  } else if (nSets >= 8) {
    cards.push({ num: `${transitions}회`, tag: '경계 진동',
      body: `레벨이 <span class="insight-em">${transitions}번</span> 오르내리며 ${nSets}세트 동안 판정이 유보됐습니다. 레벨 기준에 실력이 걸쳐 있어요.` });
  } else {
    cards.push({ num: `${nSets}세트`, tag: '표준 수렴',
      body: `${nSets}세트에 걸쳐 실력이 파악됐습니다.` });
  }

  // 2. 지문 앞뒤 집중력
  const byPos = {};
  for (let p = 1; p <= 4; p++) {
    const items = resultData.filter(r => r.지문위치 === p);
    if (items.length) byPos[p] = Math.round(items.filter(r => r.결과 === 'O').length / items.length * 100);
  }
  if (byPos[1] !== undefined && byPos[4] !== undefined) {
    const gap = byPos[4] - byPos[1];
    if (gap <= -15) {
      cards.push({ num: `−${Math.abs(gap)}%`, tag: '집중력 저하',
        body: `지문 앞부분 <span class="insight-em">${byPos[1]}%</span> → 뒷부분 <span class="insight-em">${byPos[4]}%</span>. 지문 후반 정보를 흘려듣고 있었어요. 길어질수록 집중력이 무너지는 패턴이 확인됐습니다.` });
    } else if (gap >= 15) {
      cards.push({ num: `+${gap}%`, tag: '후반 강세',
        body: `지문 앞부분 <span class="insight-em">${byPos[1]}%</span> → 뒷부분 <span class="insight-em">${byPos[4]}%</span>. 처음엔 긴장하다 적응하며 집중력이 올라가는 유형이에요.` });
    } else {
      cards.push({ num: `${gap >= 0 ? '+' : ''}${gap}%`, tag: '균일한 집중력',
        body: `앞부분 <span class="insight-em">${byPos[1]}%</span> · 뒷부분 <span class="insight-em">${byPos[4]}%</span>. 지문 어느 위치도 놓치지 않고 고르게 집중했어요.` });
    }
  }

  // 3. 셔플 충격
  const sh  = resultData.filter(r => r.셔플);
  const nsh = resultData.filter(r => !r.셔플);
  if (sh.length >= 4 && nsh.length >= 4) {
    const sAcc  = Math.round(sh.filter(r => r.결과 === 'O').length  / sh.length  * 100);
    const nsAcc = Math.round(nsh.filter(r => r.결과 === 'O').length / nsh.length * 100);
    const drop  = nsAcc - sAcc;
    if (drop >= 15) {
      cards.push({ num: `−${drop}%`, tag: '순서 의존',
        body: `순서 고정 <span class="insight-em">${nsAcc}%</span> → 순서 셔플 <span class="insight-em">${sAcc}%</span>. 문제 순서가 바뀌자 즉시 흔들렸습니다. 지문 내용보다 '몇 번째 문제인지'를 기억해서 풀고 있었을 가능성이 높아요.` });
    } else if (drop <= 0) {
      cards.push({ num: `+${Math.abs(drop)}%`, tag: '순서 독립',
        body: `순서 고정 <span class="insight-em">${nsAcc}%</span> → 순서 셔플 <span class="insight-em">${sAcc}%</span>. 순서가 달라져도 흔들리지 않았어요. 지문 내용으로 풀고 있었다는 신호입니다.` });
    } else {
      cards.push({ num: `−${drop}%`, tag: '순서 영향 미미',
        body: `순서 고정 <span class="insight-em">${nsAcc}%</span> → 순서 셔플 <span class="insight-em">${sAcc}%</span>. 순서 변화에 비교적 안정적으로 대응했습니다.` });
    }
  } else if (!sh.length && nsh.length) {
    const acc = Math.round(nsh.filter(r => r.결과 === 'O').length / nsh.length * 100);
    if (acc < 75) {
      cards.push({ num: '미활성', tag: '셔플 없음',
        body: `정답률이 75% 아래에 머물러 순서 셔플이 한 번도 작동하지 않았습니다.` });
    }
  }

  return cards.map(c => `
    <div class="insight-card">
      <div class="insight-kpi">
        <span class="insight-num">${c.num}</span>
        <span class="insight-tag">${c.tag}</span>
      </div>
      <div class="insight-body">${c.body}</div>
    </div>`).join('');
}

};

document.getElementById('retryBtn').onclick = () => {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  showScreen('startScreen');
};

document.getElementById('studentName').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('startBtn').click();
});

document.getElementById('speedSlider').oninput = function() {
  document.getElementById('speedValue').textContent = parseFloat(this.value).toFixed(1) + 'x';
  if (currentAudio) currentAudio.playbackRate = parseFloat(this.value);
};

// ── 히든 커맨드 ───────────────────────────────────────
const DEV = { on: false };
let _cmdBuf = '';

function devToast(msg) {
  const el = document.getElementById('levelFlash');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1600);
}

function highlightAnswer() {
  document.querySelectorAll('.option').forEach(div => {
    div.classList.toggle('dev-correct',
      DEV.on && !!window._correctText && div.dataset.text === window._correctText);
  });
}

document.addEventListener('keydown', e => {
  if (e.key.length !== 1 || !/[a-z]/i.test(e.key)) return;
  _cmdBuf = (_cmdBuf + e.key.toLowerCase()).slice(-6);

  if (_cmdBuf.endsWith('pdkcap')) {
    DEV.on = !DEV.on;
    if (DEV.on && currentAudio) currentAudio.playbackRate = 16;
    else if (currentAudio) currentAudio.playbackRate = parseFloat(document.getElementById('speedSlider').value);
    highlightAnswer();
    devToast(DEV.on ? '⚡ dev ON' : '⚡ dev OFF');
  }
});

// 모바일: 헤더 탭 시퀀스 (레벨→속도→레벨→속도→세트)
const DEV_TAP_SEQ = ['level','speed','level','speed','set'];
let _tapBuf = [];
let _tapTimer = null;

function getHeaderZone(el) {
  const col = el.closest('.th-col');
  if (!col) return null;
  const cols = [...document.querySelectorAll('.th-col')];
  return ['level', 'set', 'speed'][cols.indexOf(col)] ?? null;
}

document.addEventListener('click', e => {
  const zone = getHeaderZone(e.target);
  if (!zone) return;
  clearTimeout(_tapTimer);
  _tapBuf.push(zone);
  if (_tapBuf.length > DEV_TAP_SEQ.length) _tapBuf.shift();
  _tapTimer = setTimeout(() => { _tapBuf = []; }, 4000);
  if (_tapBuf.length === DEV_TAP_SEQ.length && _tapBuf.every((z, i) => z === DEV_TAP_SEQ[i])) {
    DEV.on = !DEV.on;
    if (DEV.on && currentAudio) currentAudio.playbackRate = 16;
    else if (currentAudio) currentAudio.playbackRate = parseFloat(document.getElementById('speedSlider').value);
    highlightAnswer();
    devToast(DEV.on ? '⚡ dev ON' : '⚡ dev OFF');
    _tapBuf = []; clearTimeout(_tapTimer);
  }
}, true);
</script>
