<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ESC · 용기내기 (두려움 마주하기)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="shared/esc.css?v=3">
<script src="shared/telemetry.js"></script>
<script src="shared/progress.js?v=2"></script>
<script src="shared/tips.js?v=1"></script>
<script src="shared/sfx.js?v=1"></script>
<script src="shared/fx.js?v=1"></script>
<style>
  body{overflow:hidden}
  .gwrap{max-width:460px;margin:0 auto;height:100vh;display:flex;flex-direction:column;padding:14px 16px}
  .ghud{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .ghud .x{width:42px;height:42px;border-radius:50%;background:#fff;border:none;box-shadow:0 4px 10px rgba(35,43,54,.14);font-size:18px;cursor:pointer;flex:none}
  .prog{flex:1;height:14px;border-radius:999px;background:rgba(40,48,59,.12);overflow:hidden}
  .prog .fill{height:100%;border-radius:999px;background:var(--m-challenge);width:0;transition:width .25s}
  .pn{font-family:var(--f-num);font-weight:700;font-size:15px;color:var(--ink-soft);min-width:54px;text-align:right}
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
  /* 무서운 카드 */
  .card{width:260px;height:200px;border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    box-shadow:0 10px 26px rgba(35,43,54,.16);transition:transform .3s;position:relative}
  .card.scary{background:linear-gradient(160deg,#3A3F4C,#2A2E39);color:#fff;animation:tremor 1.6s ease-in-out infinite}
  .card.easy{background:linear-gradient(160deg,#EAF6EE,#FBFEFC);color:var(--ink)}
  @keyframes tremor{0%,100%{transform:rotate(-1.2deg)}50%{transform:rotate(1.2deg)}}
  .card .big{font-size:46px} .card .lbl{font-family:var(--f-display);font-size:19px}
  .reappraise{font-size:13px;color:var(--m-challenge-d);text-align:center;max-width:300px;min-height:36px;line-height:1.45}
  .qopts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:280px}
  .qopt{height:56px;border-radius:16px;border:none;background:#fff;font-family:var(--f-display);font-size:22px;color:var(--ink);box-shadow:0 5px 0 var(--line);cursor:pointer}
  .qopt:active{transform:translateY(5px);box-shadow:none}
  .choices{display:flex;gap:12px}
  .chbtn{font-family:var(--f-display);font-size:18px;border:none;border-radius:18px;padding:14px 26px;cursor:pointer;white-space:nowrap;flex:none}
  .chbtn.go{color:#fff;background:var(--m-challenge);box-shadow:0 6px 0 var(--m-challenge-d)}
  .chbtn.go:active{transform:translateY(6px);box-shadow:none}
  .chbtn.skip{color:var(--ink-soft);background:#fff;box-shadow:0 5px 0 var(--line)}
  .chbtn.skip:active{transform:translateY(5px);box-shadow:none}
  .ghint{text-align:center;color:var(--ink-soft);font-size:12px;margin-top:8px}
</style>
</head>
<body class="gbg">

<div class="ob" id="intro" style="z-index:80;gap:16px">
  <div class="eco bob" style="width:138px"><img src="assets/mascot/web/friend_hedgehog.png" alt="고슴도치"></div>
  <div class="bubble" style="max-width:330px;font-size:16px"><b id="introNick" style="color:var(--m-challenge-d)">학생</b>, 무서워 보여도 한 발짝! 두근거림은 준비 신호야 💪</div>
  <div class="tipcard" id="introTip" style="border-left-color:var(--m-challenge)"></div>
  <button class="btn3d" id="introStart" style="--btn:var(--m-challenge);--btnd:var(--m-challenge-d)">시작하기 →</button>
</div>

<div class="gwrap" id="game" style="display:none">
  <div class="ghud">
    <button class="x" onclick="location.href='index.html'" aria-label="나가기">✕</button>
    <div class="prog"><div class="fill" id="prog"></div></div>
    <div class="pn"><span id="pn">1/8</span></div>
  </div>
  <div class="stage">
    <div class="card scary" id="card"><div class="big" id="cardBig">❓</div><div class="lbl" id="cardLbl">엄청 어려워 보이는 문제…</div></div>
    <div class="reappraise" id="reapp"></div>
    <div class="choices" id="choices">
      <button class="chbtn go" id="goBtn">도전! 💪</button>
      <button class="chbtn skip" id="skipBtn">다음에…</button>
    </div>
    <div class="qopts" id="qopts" style="display:none"></div>
  </div>
  <div class="ghint">무서워 보이는 건 <b style="color:var(--m-challenge-d)">겉모습</b>일 뿐 — 다가가면 생각보다 할 만해요</div>
</div>

<div class="screen" id="result" style="display:none"></div>

<script>
var TOTAL=8, round=0, courage=0, approached=0, solved=0, locked=false;
var card=document.getElementById('card'), cardBig=document.getElementById('cardBig'), cardLbl=document.getElementById('cardLbl'),
    reapp=document.getElementById('reapp'), choices=document.getElementById('choices'), qopts=document.getElementById('qopts'),
    prog=document.getElementById('prog'), pn=document.getElementById('pn');
var REAPP=['두근거려도 괜찮아 — 그건 뇌가 집중 준비하는 신호!','어려워 보이는 건 겉모습일 뿐이야.','틀려도 괜찮아. 도전한 것 자체가 용기야.','한 발짝만 다가가 볼까?','겁나는 만큼 네가 자라는 중이야.'];
var SCARY=['❓','🌀','🔢','🧩','⚡','🌪️'];
// 막상 풀면 쉬운 문제들 (노출 = 다가가면 할 만함)
var SUBJ=localStorage.getItem('esc_subject')||'math';
var GRADE=parseInt(localStorage.getItem('esc_grade')||'3',10);
var ENG_BASIC=[['apple','사과',['사과','바나나','포도']],['cat','고양이',['고양이','강아지','소']],['book','책',['책','연필','가방']],['water','물',['물','불','바람']],['happy','행복한',['행복한','슬픈','졸린']],['red','빨강',['빨강','파랑','노랑']],['dog','강아지',['강아지','고양이','토끼']],['sun','태양',['태양','달','별']],['friend','친구',['친구','선생님','가족']],['run','달리다',['달리다','자다','먹다']]];
var ENG_MID=[['brave','용감한',['용감한','무서운','조용한']],['choose','고르다',['고르다','버리다','잊다']],['future','미래',['미래','과거','현재']],['effort','노력',['노력','행운','실수']],['improve','나아지다',['나아지다','사라지다','멈추다']],['challenge','도전',['도전','포기','휴식']],['believe','믿다',['믿다','의심하다','싫어하다']],['enough','충분한',['충분한','부족한','넘치는']]];
function shuffleArr(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }
function makeQ(){
  if(SUBJ==='eng'){ var pool=GRADE>=7?ENG_MID:ENG_BASIC; var it=pool[Math.floor(Math.random()*pool.length)];
    return {q:it[0]+' = ?', ans:it[1], opts:shuffleArr(it[2])}; }
  if(GRADE>=10){ var a=11+Math.floor(Math.random()*39), b=2+Math.floor(Math.random()*8), s=a+b; return {q:a+' + '+b+' = ?', ans:s, opts:shuffleArr([s,s+1,s-2])}; }
  if(GRADE>=7){ var x=2+Math.floor(Math.random()*8), y=2+Math.floor(Math.random()*8), p=x*y; return {q:x+' × '+y+' = ?', ans:p, opts:shuffleArr([p,p+x,p-y])}; }
  if(Math.random()<0.5){ var c=1+Math.floor(Math.random()*9), d=1+Math.floor(Math.random()*9), e=c+d; return {q:c+' + '+d+' = ?', ans:e, opts:shuffleArr([e,e+1,Math.max(1,e-1)])}; }
  var n=2+Math.floor(Math.random()*7); return {q:n+' 다음 수는?', ans:n+1, opts:shuffleArr([n+1,n,n+2])};
}
var curQ=null;

function newRound(){
  round++; if(round>TOTAL){ endGame(); return; }
  locked=false; pn.textContent=round+'/'+TOTAL; prog.style.width=Math.round((round-1)/TOTAL*100)+'%';
  card.className='card scary'; cardBig.textContent=SCARY[Math.floor(Math.random()*SCARY.length)];
  cardLbl.textContent=['엄청 어려워 보이는 문제…','헉, 복잡해 보여…','왠지 겁나는 문제…'][Math.floor(Math.random()*3)];
  reapp.textContent=REAPP[Math.floor(Math.random()*REAPP.length)];
  choices.style.display='flex'; qopts.style.display='none';
}
function approach(){
  if(locked) return; locked=true; approached++; courage++;
  if(window.SFX)SFX.play('select');
  curQ=makeQ();
  card.className='card easy'; cardBig.textContent='🙂'; cardLbl.textContent=curQ.q;
  reapp.textContent='거봐, 막상 보니 할 만하지?';
  choices.style.display='none'; qopts.style.display='grid'; qopts.innerHTML='';
  curQ.opts.forEach(function(o){ var b=document.createElement('button'); b.className='qopt'; b.textContent=o; b.onclick=function(){ pick(o); }; qopts.appendChild(b); });
}
function pick(o){
  var ok=(o===curQ.ans); if(ok){ solved++; if(window.SFX)SFX.play('correct'); reapp.textContent='맞았어! 용감하게 다가간 보상이야 🎉'; }
  else { if(window.SFX)SFX.play('select'); reapp.textContent='괜찮아 — 도전한 것 자체가 진짜 용기야 🌱'; }
  qopts.querySelectorAll('button').forEach(function(b){ b.disabled=true; });
  setTimeout(newRound, 950);
}
function skip(){
  if(locked) return; locked=true; if(window.SFX)SFX.play('wrong');
  reapp.textContent='이번엔 넘어갔지만, 다음엔 같이 한 발짝! 🌱';
  setTimeout(newRound, 850);
}
document.getElementById('goBtn').onclick=approach;
document.getElementById('skipBtn').onclick=skip;

function startGame(){
  document.getElementById('intro').classList.add('hide');
  setTimeout(function(){ document.getElementById('intro').style.display='none'; },420);
  document.getElementById('game').style.display='flex';
  round=0; courage=0; approached=0; solved=0;
  ESCT.log('session_started',{mode:'focus',game:'brave'});
  newRound();
}
function endGame(){
  prog.style.width='100%';
  var courPct=Math.round(courage/TOTAL*100);
  var acc=Math.max(0.5, courage/TOTAL); // 용기(도전율)가 핵심 지표
  var fb = courPct>=80 ? '무서워 보여도 거의 다 도전했어 — 진짜 용감해! 💪' : (courPct>=50 ? '한 발짝씩 다가가는 중! 용기가 자라고 있어 🌱' : '괜찮아, 다음엔 한 번만 더 도전해보자. 넌 할 수 있어 🤍');
  ESCT.log('session_completed',{mode:'focus',game:'brave',courage:courage,approached:approached,solved:solved,overallAccuracy:acc,completed:true});
  var rw=null; try{ rw=ESCProgress.recordSession('challenge'); }catch(e){}
  if(window.SFX)SFX.play('complete');
  document.getElementById('game').style.display='none';
  var gained=rw&&rw.gained?rw.gained:0;
  var r=document.getElementById('result'); r.style.display='flex'; if(window.FX)FX.confetti();
  r.innerHTML=
    '<div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin:22px 0 16px">'
    +'<div class="celebrate celebrate-pop"><div class="eco bob" style="width:124px"><img src="assets/mascot/web/friend_hedgehog.png" alt=""></div></div>'
    +'<div class="celebrate-pop" style="font-family:Jua,sans-serif;font-size:24px">용기 '+courage+'번! 💪</div></div>'
    +'<div class="statgrid">'
    +'<div class="stat-tile blue"><div class="k">💪 도전</div><div class="v">'+courage+'/'+TOTAL+'</div></div>'
    +'<div class="stat-tile green"><div class="k">🙂 맞힘</div><div class="v">'+solved+'</div></div>'
    +'<div class="stat-tile gold"><div class="k"><img class="ico" src="assets/icons/star.png" alt=""> 획득</div><div class="v">+'+gained+'</div></div>'
    +'</div>'
    +'<div class="bubble" style="margin:6px 0 14px">'+fb+'</div>'
    +'<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'
    +'<a class="btn3d" style="--btn:var(--m-challenge);--btnd:var(--m-challenge-d)" href="brave.html">다시 <img class="ico" src="assets/icons/refresh.png" alt=""></a>'
    +'<a class="btn3d ghost" href="index.html">홈으로</a></div>';
}

(function(){
  document.getElementById('introNick').textContent=(localStorage.getItem('esc_nick')||'학생');
  try{ var tip=ESCTips.pickAny();
    document.getElementById('introTip').innerHTML='<div class="tag" style="color:var(--m-challenge-d)">'+ESCTips.icon[tip.t]+' '+ESCTips.tag[tip.t]+'</div><div class="h">'+tip.h+'</div><div class="s">'+tip.s+'</div>';
  }catch(e){}
  document.getElementById('introStart').onclick=startGame;
})();
</script>
</body>
</html>
