<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ESC · 스트룹 (억제)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="shared/esc.css?v=3">
<script src="shared/telemetry.js"></script>
<script src="shared/progress.js?v=2"></script>
<script src="shared/tips.js?v=1"></script>
<script src="shared/sfx.js?v=1"></script>
<script src="shared/fx.js?v=1"></script>
<style>
  body{overflow:hidden}
  .gwrap{max-width:460px;margin:0 auto;height:100vh;display:flex;flex-direction:column;padding:14px 16px}
  .ghud{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .ghud .x{width:42px;height:42px;border-radius:50%;background:#fff;border:none;box-shadow:0 4px 10px rgba(35,43,54,.14);font-size:18px;cursor:pointer;flex:none}
  .prog{flex:1;height:14px;border-radius:999px;background:rgba(40,48,59,.12);overflow:hidden}
  .prog .fill{height:100%;border-radius:999px;background:var(--m-challenge);width:0;transition:width .2s}
  .pn{font-family:var(--f-num);font-weight:700;font-size:15px;color:var(--ink-soft);min-width:48px;text-align:right}
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
  .word{font-family:var(--f-display);font-size:clamp(54px,17vw,80px);line-height:1;transition:transform .05s}
  .ask{color:var(--ink-soft);font-size:14px}
  .swatches{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding-bottom:6px}
  .sw{height:64px;border-radius:18px;border:none;cursor:pointer;box-shadow:0 5px 0 rgba(35,43,54,.18);transition:transform .06s}
  .sw:active{transform:translateY(5px);box-shadow:none}
  .ghint{text-align:center;color:var(--ink-soft);font-size:12px;margin-top:6px}
  .sw.sw-txt{background:#fff;color:var(--ink);font-family:var(--f-display);font-size:22px;box-shadow:0 5px 0 var(--line);display:flex;align-items:center;justify-content:center}
  .sw.sw-txt:active{box-shadow:0 0 0 var(--line)}
  .word div{font-weight:700}
  .stage.good .word{transform:scale(1.08)} .stage.bad .word{animation:wsh .3s}
  @keyframes wsh{0%,100%{transform:translateX(0)}30%{transform:translateX(-8px)}70%{transform:translateX(8px)}}
</style>
</head>
<body>

<div class="ob" id="intro" style="z-index:80;gap:16px">
  <div class="eco bob" style="width:138px"><img src="assets/mascot/web/friend_hedgehog.png" alt="고슴도치"></div>
  <div class="bubble" style="max-width:330px;font-size:16px"><b id="introNick" style="color:var(--m-challenge)">학생</b>, 글자 말고 <b style="color:var(--m-challenge)">색</b>에 반응! 🎨</div>
  <div class="tipcard" id="introTip" style="border-left-color:var(--m-challenge)"></div>
  <button class="btn3d" id="introStart" style="--btn:var(--m-challenge);--btnd:var(--m-challenge-d)">시작하기 →</button>
</div>

<div class="gwrap" id="game" style="display:none">
  <div class="ghud">
    <button class="x" onclick="location.href='index.html'" aria-label="나가기">✕</button>
    <div class="prog"><div class="fill" id="prog"></div></div>
    <div class="pn" id="pn">0/30</div>
  </div>
  <div class="stage" id="stage">
    <div class="ask" id="ask">글자의 <b>색</b>을 고르세요</div>
    <div class="word" id="word">●</div>
  </div>
  <div class="swatches" id="swatches"></div>
  <div class="ghint"><b style="color:var(--m-challenge-d)">함정에 속지 말고</b> 진짜를 빠르게 — 자동반응을 누르는 억제 훈련</div>
</div>

<div class="screen" id="result" style="display:none"></div>

<script>
var COLORS=[{n:'빨강',h:'#E5634D'},{n:'파랑',h:'#4C82E8'},{n:'초록',h:'#4FB477'},{n:'노랑',h:'#E8A11E'}];
var DIRS=[{n:'왼쪽',g:'←',v:'L'},{n:'오른쪽',g:'→',v:'R'},{n:'위',g:'↑',v:'U'},{n:'아래',g:'↓',v:'D'}];
var TOTAL=30, trial=0, correct=0, rtSum=0, tStart=0, curCorrect=null;
var stage=document.getElementById('stage'), wordEl=document.getElementById('word'), askEl=document.getElementById('ask'),
    sw=document.getElementById('swatches'), prog=document.getElementById('prog'), pn=document.getElementById('pn');
function rnd(a){ return a[Math.floor(Math.random()*a.length)]; }
function shade(hex){ var n=parseInt(hex.slice(1),16), r=Math.max(0,(n>>16)-26), g=Math.max(0,((n>>8)&255)-26), b=Math.max(0,(n&255)-26); return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1); }
function setOptions(opts){
  sw.innerHTML=''; sw.style.gridTemplateColumns='repeat(2,1fr)';
  opts.forEach(function(o){ var b=document.createElement('button'); b.className='sw';
    if(o.bg){ b.style.background=o.bg; b.style.boxShadow='0 5px 0 '+shade(o.bg); }
    else { b.classList.add('sw-txt'); b.textContent=o.label; }
    b.onclick=function(){ answer(o.value); }; sw.appendChild(b); });
}
function nextTrial(){
  if(trial>=TOTAL){ endGame(); return; }
  trial++; pn.textContent=trial+'/'+TOTAL; prog.style.width=Math.round((trial-1)/TOTAL*100)+'%';
  wordEl.style.fontSize=''; wordEl.style.color=''; wordEl.innerHTML='';
  var v=rnd(['color','count','direction','size']);
  if(v==='color'){
    askEl.innerHTML='글자의 <b>색</b>을 고르세요';
    var w=rnd(COLORS), ink=w; if(Math.random()<0.65){ do{ink=rnd(COLORS);}while(ink===w); }
    wordEl.textContent=w.n; wordEl.style.color=ink.h; curCorrect='c:'+ink.n;
    setOptions(COLORS.map(function(c){return {bg:c.h,value:'c:'+c.n};}));
  } else if(v==='count'){
    askEl.innerHTML='<b>몇 개</b>인가요?';
    var dg=rnd([2,3,4,5,6,7,8,9]), ct=rnd([2,3,4,5]);
    wordEl.style.fontSize='46px'; wordEl.style.color='#28303B'; wordEl.textContent=Array(ct+1).join(dg+' ').trim();
    curCorrect='n:'+ct; setOptions([2,3,4,5].map(function(n){return {label:String(n),value:'n:'+n};}));
  } else if(v==='direction'){
    askEl.innerHTML='<b>화살표</b> 방향을 고르세요';
    var d=rnd(DIRS), wd=d; if(Math.random()<0.65){ do{wd=rnd(DIRS);}while(wd===d); }
    wordEl.innerHTML=d.g+'<div style="font-size:.32em;color:var(--ink-soft);margin-top:2px">'+wd.n+'</div>'; curCorrect='d:'+d.v;
    setOptions(DIRS.map(function(x){return {label:x.g,value:'d:'+x.v};}));
  } else {
    askEl.innerHTML='글자 <b>크기</b>를 고르세요';
    var big=Math.random()<0.5, txt=Math.random()<0.5?'큰':'작은';
    wordEl.textContent=txt; wordEl.style.color='#28303B'; wordEl.style.fontSize=big?'84px':'32px';
    curCorrect='s:'+(big?'big':'small'); setOptions([{label:'큰 글자',value:'s:big'},{label:'작은 글자',value:'s:small'}]);
  }
  tStart=performance.now();
}
function answer(val){
  var ok=(val===curCorrect);
  if(ok){ correct++; rtSum+=(performance.now()-tStart); stage.className='stage good'; if(window.SFX)SFX.play('correct'); }
  else { stage.className='stage bad'; if(window.SFX)SFX.play('wrong'); }
  setTimeout(function(){ stage.className='stage'; nextTrial(); }, ok?180:430);
}
function startGame(){
  document.getElementById('intro').classList.add('hide');
  setTimeout(function(){ document.getElementById('intro').style.display='none'; },420);
  document.getElementById('game').style.display='flex';
  trial=0; correct=0; rtSum=0;
  ESCT.log('session_started',{mode:'focus',game:'stroop'});
  nextTrial();
}
function endGame(){
  prog.style.width='100%';
  var acc=Math.round(correct/TOTAL*100);
  var avgRt=correct?Math.round(rtSum/correct):0;
  ESCT.log('session_completed',{mode:'focus',game:'stroop',overallAccuracy:acc/100,avgRt:avgRt,correct:correct,completed:true});
  var rw=null; try{ rw=ESCProgress.recordSession('focus'); }catch(e){}
  if(window.SFX)SFX.play('complete');
  document.getElementById('game').style.display='none';
  var gained=rw&&rw.gained?rw.gained:0;
  var fb = acc>=80 ? '함정에 안 휘둘리는 억제력이 좋아요!' : acc>=50 ? '글자 뜻은 무시하고 "진짜 속성"에만 집중해봐요.' : '답하기 전 0.5초만 멈추고 "진짜"를 확인하는 연습을 해봐요.';
  var r=document.getElementById('result'); r.style.display='flex'; if(window.FX)FX.confetti();
  r.innerHTML=
    '<div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin:22px 0 16px">'
    +'<div class="celebrate celebrate-pop"><div class="eco bob" style="width:122px"><img src="assets/mascot/web/friend_hedgehog.png" alt=""></div></div>'
    +'<div class="celebrate-pop" style="font-family:Jua,sans-serif;font-size:25px">억제 완료! 🎉</div></div>'
    +'<div class="statgrid">'
    +'<div class="stat-tile blue"><div class="k">🎯 정확도</div><div class="v">'+acc+'%</div></div>'
    +'<div class="stat-tile green"><div class="k">⚡ 반응</div><div class="v">'+(avgRt||'-')+(avgRt?'ms':'')+'</div></div>'
    +'<div class="stat-tile gold"><div class="k">⭐ 획득</div><div class="v">+'+gained+'</div></div>'
    +'</div>'
    +'<div class="bubble" style="margin:6px 0 14px">'+correct+'/'+TOTAL+' 정답 · '+fb+'</div>'
    +'<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'
    +'<a class="btn3d" style="--btn:var(--m-challenge);--btnd:var(--m-challenge-d)" href="stroop.html">다시 🔄</a>'
    +'<a class="btn3d ghost" href="index.html">홈으로</a></div>';
}

(function(){
  document.getElementById('introNick').textContent=(localStorage.getItem('esc_nick')||'학생');
  try{ var tip=ESCTips.pickAny();
    document.getElementById('introTip').innerHTML='<div class="tag" style="color:var(--m-challenge)">'+ESCTips.icon[tip.t]+' '+ESCTips.tag[tip.t]+'</div><div class="h">'+tip.h+'</div><div class="s">'+tip.s+'</div>';
  }catch(e){}
  document.getElementById('introStart').onclick=startGame;
})();
</script>
</body>
</html>
